// ─── WhatsApp confirmation for new order ─────────────
function buildOrderConfirmText({name, pests, date, timeFrom, timeTo, address, company}){
  const BEFORE = {
    "תיקן אמריקאי":  ["לפנות את הדירה לשעה לפחות","להוציא חפצים מארון מתחת לכיור","להרחיק חיות מחמד ותינוקות"],
    "תיקן גרמני":    ["לשטוף כלים ולסדר מטבח","לא להוציא דברים מהארונות"],
    "נמלים":         ["לטאטא ולשטוף את הרצפה יסודית","לפנות חפצים מהפאנלים"],
    "עכברים":        ["לפנות שאריות מזון ולסגור פחי אשפה","לאתר ולסתום חורים וסדקים"],
    "חולדות":        ["לפנות אזורי אחסון ומחסנים","לסגור ברזים ולאתם מקורות מים"],
    "פרעושים":       ["לשאוב אבק יסודית בכל חדרי הבית","להרים הכל מהרצפה","לכבס מצעים ב-60° לפני ואחרי"],
    "יתושים":        ["לרוקן מים עומדים בחצר ובעציצים","לנקות ביבים וניקוזים"],
    "זבובים":        ["לכסות ולהסיר מזון חשוף","לרוקן פחי אשפה"],
    "דבורים וצרעות": ["להתרחק מאזור הקן","לא להתגרות בדבורים/צרעות"],
    "פרעושים":       ["לשאוב אבק יסודית","לכבס מצעים ב-60°","לטפל גם בחיית המחמד אצל הווטרינר"],
  };
  const AFTER = {
    "תיקן אמריקאי":  ["לא לשטוף רצפות 24 שעות","לאוורר לפחות שעה לפני חזרה","חיות מחמד — 4 שעות בחוץ"],
    "תיקן גרמני":    ["לא לנגב פאנלים 24 שעות","לא להזיז ג'ל או מלכודות"],
    "נמלים":         ["לא לשטוף רצפות 24 שעות","לא לרסס חומרי ניקוי ליד הפאנלים"],
    "עכברים":        ["לא לגעת במלכודות ובתחנות","לדווח לנו אם מוצאים פגרים"],
    "חולדות":        ["לא לגעת בתחנות ההאכלה","להרחיק ילדים וחיות מחמד","לדווח על פגרים"],
    "פרעושים":       ["לא לשטוף רצפות 24 שעות","חיות מחמד — 8 שעות בחוץ","לכבס מצעים שוב אחרי החזרה"],
    "יתושים":        ["ניתן לחזור לאחר שעה","לסגור חלונות 2 שעות נוספות"],
    "זבובים":        ["לא להכניס מזון חשוף 4 שעות","לאוורר לאחר הטיפול"],
    "דבורים וצרעות": ["לא להתקרב לאזור הקן 24 שעות","לאוורר היטב"],
  };
  const lines = [
    "שלום *"+name+"* 👋",
    "",
    "קיבלנו את הזמנתך ואנחנו שמחים לאשר טיפול! 🦟",
    "",
    "📋 *פרטי הביקור:*",
  ];
  if(address) lines.push("📍 כתובת: "+address);
  if(date){ const [y,m,d]=date.split("-"); lines.push("📅 תאריך: "+d+"/"+m+"/"+y); }
  if(timeFrom&&timeTo) lines.push("🕐 חלון הגעה: "+timeFrom+" – "+timeTo);
  if(pests&&pests.length) lines.push("🐛 טיפול: "+pests.join(", "));
  lines.push("");
  lines.push("⚠️ *אנא אמתו שהכתובת נכונה — אם יש טעות ניצור קשר.*");
  lines.push("");

  const relevantPests=pests.filter(p=>BEFORE[p]||AFTER[p]);
  if(relevantPests.length>0){
    relevantPests.forEach(pest=>{
      lines.push("─────────────────");
      lines.push("*"+pest+":*");
      if(BEFORE[pest]){
        lines.push("*לפני הטיפול:*");
        BEFORE[pest].forEach(t=>lines.push("  • "+t));
      }
      if(AFTER[pest]){
        lines.push("*אחרי הטיפול:*");
        AFTER[pest].forEach(t=>lines.push("  • "+t));
      }
    });
    lines.push("─────────────────");
    lines.push("");
  }
  lines.push("לשאלות נשמח לעמוד לרשותך 😊");
  lines.push(company.name+" 🦟");
  return lines.join("\n");
}


// ─── Existing Customer Search ─────────────────────

      </div>
      <div>
        {q.length<2&&<div style={{padding:"30px 20px",textAlign:"center",color:"#9ca3af",fontSize:13}}>הקלד שם, טלפון או כתובת לחיפוש לקוח קיים</div>}

        {results.map(c=>(
          <div key={c.id} onClick={()=>onSelect(c)}

              {c.name.charAt(0)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14,color:"#111"}}>{c.name}</div>
              <div style={{fontSize:12,color:"#6b7280",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{c.phone} · {c.address}</div>
              <div style={{fontSize:11,color:CLR.primary,marginTop:2}}>{c.propertyType}{c.pests&&c.pests.length?" · "+c.pests.join(", "):""}{c.lastTreatment?" · טיפול אחרון: "+fmtDate(c.lastTreatment):""}</div>
            </div>
            <div style={{fontSize:12,color:CLR.primary,fontWeight:600,flexShrink:0}}>בחר →</div>
          </div>
        ))}
      </div>
      {results.length>0&&<div style={{padding:"10px 18px",borderTop:"1px solid #f3f4f6",fontSize:11,color:"#9ca3af",textAlign:"center"}}>לחץ על לקוח למילוי אוטומטי של הטופס</div>}
    </div>
  </div>;
}

// ─── Auto-routing: match worker zone to address ──
function suggestWorker(address, workers){
  if(!address) return null;
  const addr = address.toLowerCase();
  // Zone keywords → score per worker
  const ZONE_KEYWORDS = {
    "תל אביב": ["תל אביב","יפו","רמת גן","גבעתיים","בני ברק","פתח תקווה","ראשון לציון","בת ים","חולון","הרצליה","רעננה","כפר סבא","נתניה"],
    "חיפה": ["חיפה","קריות","עכו","נהריה","קריית שמונה","צפת","טבריה","עפולה","נצרת","כרמיאל"],
    "ירושלים": ["ירושלים","בית שמש","מעלה אדומים","מודיעין","לוד","רמלה","בית שמש"],
    "דרום": ["באר שבע","אשדוד","אשקלון","קריית גת","נתיבות","שדרות","אופקים","אילת","דימונה","ערד"],
    "מרכז": ["ראשון לציון","רחובות","נס ציונה","יבנה","גדרה","רמלה","לוד","פתח תקווה","אריאל"],
  };
  let bestWorker = null;
  let bestScore = 0;
  workers.filter(w=>w.role==="מדביר"&&w.status==="פעיל").forEach(w=>{
    const zone = (w.zone||"").toLowerCase();
    let score = 0;
    // Direct zone name match
    Object.entries(ZONE_KEYWORDS).forEach(([zName, keywords])=>{
      if(zone.includes(zName.toLowerCase())){
        keywords.forEach(kw=>{ if(addr.includes(kw.toLowerCase())) score+=10; });
      }
    });
    // Keyword in zone matches keyword in address
    const zoneWords = zone.split(/[\s,/]+/).filter(w=>w.length>2);
    zoneWords.forEach(zw=>{ if(addr.includes(zw)) score+=5; });
    if(score > bestScore){ bestScore=score; bestWorker=w; }
  });
  return bestScore>0 ? bestWorker : null;
}

          if(r.properties&&r.properties.length) setQuote({properties:r.properties,total:r.total});
          if(r.pests&&r.pests.length){
            const known=r.pests.filter(p=>PEST_TYPES_CRM.includes(p));
            const unknown=r.pests.filter(p=>!PEST_TYPES_CRM.includes(p));
            if(known.length) set("pests",Array.from(new Set([...f.pests,...known])));
            if(unknown.length) set("customPest",unknown.join(", "));
          }
          setShowCalc(false);
        }}/>
    </Modal>}
    {showSend&&(()=>{
      const addr=fullAddress();
      const tw=`${f.timeFrom}–${f.timeTo}`;
      const qPrice=parseInt(f.price)||(quote&&quote.total)||0;
      const text=buildClientQuoteText({company:COMPANY,customerName:f.name,date:f.prefDate,timeWindow:f.prefDate?tw:"",address:addr,quote,price:qPrice});
      const waUrl=`https://wa.me/${(f.phone||"").replace(/[^0-9]/g,"").replace(/^0/,"972")}?text=${encodeURIComponent(text)}`;
      const mailUrl=`mailto:${f.email||""}?subject=${encodeURIComponent("הצעת מחיר – "+COMPANY.name)}&body=${encodeURIComponent(text)}`;
      return <Modal title="📤 שליחת הצעת מחיר ללקוח" onClose={()=>setShowSend(false)} width={560}>
        <div style={{background:CLR.surface,borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:13,whiteSpace:"pre-wrap",maxHeight:240,overflow:"auto",lineHeight:1.6,border:`1px solid ${CLR.border}`}}>{text}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <a href={waUrl} target="_blank" rel="noopener" style={{textDecoration:"none"}}>
            <Btn full v="primary">💬 שלח בוואטסאפ</Btn>
          </a>
          <a href={mailUrl} style={{textDecoration:"none"}}>
            <Btn full v="secondary">✉️ שלח במייל</Btn>
          </a>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn full v="secondary" onClick={()=>openPrintWindow("הצעת מחיר",clientQuoteHtml({company:COMPANY,customerName:f.name,date:f.prefDate,timeWindow:f.prefDate?tw:"",address:addr,quote,price:qPrice}))}>📄 הצעת מחיר PDF</Btn>
          <Btn full v="ghost" onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(text);alert("ההצעה הועתקה");}}>📋 העתק טקסט</Btn>
        </div>
        <div style={{fontSize:11,color:CLR.muted,marginTop:10,textAlign:"center"}}>ההצעה ללקוח כוללת מחיר מפורט והנחיות בלבד — ללא הנחות או שילובים פנימיים.</div>
      </Modal>;
    })()}
  </div>;

  // With side guidance panel (used in the full-page tab)
  const guide=INTAKE_GUIDANCE[f.propertyType]||INTAKE_GUIDANCE["default"];
  const selectedPests=allPests();
  // gather unique pest-guidance lines for chosen pests
  const pestTips=[];
  const seen=new Set();
  selectedPests.forEach(p=>{
    (PEST_GUIDANCE[p]||[]).forEach(tip=>{ if(!seen.has(tip)){seen.add(tip);pestTips.push(tip);} });
  });

  return <div style={{display:"grid",gridTemplateColumns:"1fr 290px",gap:20,alignItems:"start"}}>
    <div>{formBody}</div>
    <div style={{position:"sticky",top:16,display:"flex",flexDirection:"column",gap:14}}>
      {/* What to ask */}
      <div style={{background:"#fffbeb",border:`1px solid ${CLR.accent}55`,borderRadius:12,padding:"16px 18px"}}>
        <div style={{fontWeight:700,color:"#92400e",fontSize:14,marginBottom:8}}>💡 מה לשאול את הלקוח</div>
        <div style={{fontSize:12,color:CLR.muted,marginBottom:8}}>לפי סוג נכס: <b style={{color:"#92400e"}}>{f.propertyType}</b></div>
        <ul style={{margin:0,paddingRight:18,fontSize:13,lineHeight:1.8,color:"#78350f"}}>
          {guide.map((q,i)=><li key={i}>{q}</li>)}
        </ul>
      </div>

      {/* Pest preparation guidance */}
      {selectedPests.length>0&&<div style={{background:"#eff6ff",border:"1px solid "+CLR.info+"44",borderRadius:12,padding:"14px 16px"}}>
        <div style={{fontWeight:700,color:"#1e40af",fontSize:14,marginBottom:10}}>🛡️ הנחיות הכנה לפי מזיק</div>
        {selectedPests.map(p=>{
          const tips=PEST_GUIDANCE[p]||[];
          if(!tips.length) return null;
          return <div key={p} style={{marginBottom:10,background:"#fff",borderRadius:8,padding:"9px 12px",border:"1px solid #bfdbfe"}}>
            <div style={{fontWeight:700,color:"#1e40af",fontSize:12,marginBottom:5,display:"flex",alignItems:"center",gap:6}}>
              <span style={{background:"#1e40af",color:"#fff",borderRadius:4,padding:"1px 7px",fontSize:11}}>🐛 {p}</span>
            </div>
            <ul style={{margin:0,paddingRight:16,fontSize:12,lineHeight:1.8,color:"#1e3a5f"}}>
              {tips.map((t,i)=><li key={i}>{t}</li>)}
            </ul>
          </div>;
        })}
      </div>}

      {/* Recent orders history */}
      <div style={{background:CLR.white,border:`1px solid ${CLR.border}`,borderRadius:12,padding:"16px 18px"}}>
        <div style={{fontWeight:700,color:CLR.primary,fontSize:14,marginBottom:10}}>🕘 היסטוריית הזמנות</div>
        {(!recentOrders||recentOrders.length===0)
          ? <div style={{fontSize:12,color:CLR.muted}}>אין הזמנות עדיין</div>
          : <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:320,overflowY:"auto"}}>
              {recentOrders.slice(0,12).map((o,i)=>(
                <div key={o.id} style={{borderRight:`3px solid ${CLR.primary}`,background:CLR.surface,borderRadius:6,padding:"7px 10px",fontSize:12}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:600}}>{i+1}. {o.customerName}</span>
                    <span style={{color:CLR.muted}}>{fmtDate(o.date)}</span>
                  </div>
                  <div style={{color:CLR.muted,marginTop:2}}>{o.pestType} {o.workerName?`· ${o.workerName}`:""} {o.price?`· ₪${o.price}`:""}</div>
                </div>
              ))}
            </div>}
      </div>
    </div>
  </div>;
}

function Customers({customers,setCustomers,appointments,setAppointments,workers,collabs=[],finance,setFinance,execLogs,currentUser}){
  const [srch,setSrch]=useState("");
  const [sel,setSel]=useState(null);
  const [editingCust,setEditingCust]=useState(false);
  const [editCustData,setEditCustData]=useState({});
  const setEC=(k,v)=>setEditCustData(x=>({...x,[k]:v}));
  const [showNew,setShowNew]=useState(false);
  const [showCalc,setShowCalc]=useState(false);
  const [invAppt,setInvAppt]=useState(null);
  const [schedFor,setSchedFor]=useState(null);
  const [filterStatus,setFilterStatus]=useState("הכל");
  const [filterType,setFilterType]=useState("הכל");
  const [showArchive,setShowArchive]=useState(false);

  // Auto-archive: customers with no treatment in 12+ months and status not "חוב"
  const oneYearAgo=new Date(); oneYearAgo.setFullYear(oneYearAgo.getFullYear()-1);
  const oneYearAgoISO=oneYearAgo.toISOString().split("T")[0];
  const isArchived=c=>{
    if(c.archived) return true;
    if(c.status==="חוב") return false; // never auto-archive debtors
    const lastAppt=appointments.filter(a=>a.customerId===c.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const lastActivity=lastAppt?.date||c.lastTreatment||"";
    return lastActivity&&lastActivity<oneYearAgoISO&&c.status!=="פעיל";
  };
  const activeCustomers=customers.filter(c=>!isArchived(c));
  const archivedCustomers=customers.filter(c=>isArchived(c));
  const displayCustomers=showArchive?archivedCustomers:activeCustomers;

  const filtered=displayCustomers.filter(c=>{
    const matchSrch=!srch||c.name.includes(srch)||c.phone.includes(srch)||(c.address||"").includes(srch)||(c.city||"").includes(srch);
    const matchStatus=filterStatus==="הכל"||c.status===filterStatus;
    const matchType=filterType==="הכל"||(c.propertyType||"")===filterType;
    return matchSrch&&matchStatus&&matchType;
  });
  return <div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <input placeholder="🔍 חיפוש שם, טלפון, כתובת..." value={srch} onChange={e=>setSrch(e.target.value)} style={{flex:1,minWidth:160,padding:"9px 14px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,background:"#f9fafb",boxSizing:"border-box"}}/>
      <Btn v="accent" sm onClick={()=>setShowCalc(true)}>🧮 מחשבון</Btn>
      <Btn sm v="secondary" onClick={()=>exportCustomers(customers)}>📥 ייצא Excel</Btn>
      <button onClick={()=>setShowArchive(a=>!a)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(showArchive?"#f59e0b":CLR.border),background:showArchive?"#fef9c3":"transparent",color:showArchive?"#92400e":CLR.muted,cursor:"pointer",fontSize:13,fontWeight:showArchive?700:400}}>
        {showArchive?"← חזור לפעילים":"📦 ארכיון ("+archivedCustomers.length+")"}
      </button>
      <Btn sm onClick={()=>setShowNew(true)}>+ תיק הדברה חדש</Btn>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:12,color:CLR.muted}}>סטטוס:</span>
      {["הכל","פעיל","חוב","לא פעיל"].map(st=>(
        <button key={st} type="button" onClick={()=>setFilterStatus(st)}
          style={{padding:"4px 12px",borderRadius:20,border:"1px solid "+(filterStatus===st?CLR.primary:CLR.border),background:filterStatus===st?CLR.primary:"transparent",color:filterStatus===st?"#fff":CLR.muted,cursor:"pointer",fontSize:12,fontWeight:filterStatus===st?600:400}}>
          {st}
        </button>
      ))}
      <span style={{fontSize:12,color:CLR.muted,marginRight:8}}>סוג נכס:</span>
      {["הכל","דירה","בית פרטי","בניין משותף","עסק","מסעדה"].map(tp=>(
        <button key={tp} type="button" onClick={()=>setFilterType(tp)}
          style={{padding:"4px 12px",borderRadius:20,border:"1px solid "+(filterType===tp?CLR.primary:CLR.border),background:filterType===tp?CLR.primary:"transparent",color:filterType===tp?"#fff":CLR.muted,cursor:"pointer",fontSize:12,fontWeight:filterType===tp?600:400}}>
          {tp}
        </button>
      ))}
      {(filterStatus!=="הכל"||filterType!=="הכל")&&<button onClick={()=>{setFilterStatus("הכל");setFilterType("הכל");}} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #fca5a5",background:"#fee2e2",color:CLR.danger,cursor:"pointer",fontSize:12}}>✕ נקה</button>}
      <span style={{fontSize:12,color:CLR.muted,marginRight:"auto"}}>{filtered.length} לקוחות</span>
    </div>
    {showArchive&&<div style={{background:"#fef9c3",border:"1px solid #fcd34d",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#92400e"}}>
      📦 מציג לקוחות בארכיון — לקוחות שלא פעילים מעל שנה. לחץ "↩️ הוצא מארכיון" בתיק הלקוח כדי להחזיר.
    </div>}
    {!showArchive&&archivedCustomers.length>0&&<div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,padding:"8px 14px",marginBottom:10,fontSize:12,color:"#6b7280"}}>
      📦 {archivedCustomers.length} לקוחות בארכיון (לא פעילים מעל שנה)
    </div>}
    <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
      {filtered.map(c=><div key={c.id} onClick={()=>setSel(c)}
        style={{background:CLR.white,border:`1px solid ${CLR.border}`,borderRadius:12,padding:"14px 18px",width:280,cursor:"pointer"}}
        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.09)"}
        onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,alignItems:"start"}}>
          <div><div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:5}}>
            {c.tag==="vip"&&<span>⭐</span>}{c.tag==="new"&&<span>🆕</span>}{c.tag==="problem"&&<span>⚠️</span>}{c.tag==="loyal"&&<span>💚</span>}
            {c.name}</div><div style={{fontSize:12,color:CLR.muted}}>{c.phone}</div></div>
          <Badge status={c.status}/>
        </div>
        <div style={{fontSize:12,color:CLR.muted,marginBottom:3}}>📍 {c.address}</div>
        <div style={{fontSize:12,color:CLR.muted,marginBottom:10}}>🏠 {c.propertyType}{c.rooms?` | ${c.rooms} חד'`:""} | קו' {c.floor}</div>
        <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${CLR.border}`,paddingTop:8,fontSize:12}}>
          <span style={{color:CLR.muted}}>{c.lastTreatment?fmtDate(c.lastTreatment):"טרם טופל"}</span>
          <span style={{fontWeight:600,color:CLR.primary}}>₪{c.totalPaid}</span>
        </div>
      </div>)}
    </div>
    {sel&&<Modal title={`🗂️ תיק הדברה – ${sel.name}`} onClose={()=>setSel(null)} width={600}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        {!editingCust
          ? <Btn sm onClick={()=>{setEditCustData({...sel});setEditingCust(true);}}>✏️ ערוך פרטים</Btn>
          : <div style={{display:"flex",gap:8}}>
              <Btn sm onClick={()=>{setCustomers(cs=>cs.map(c=>c.id===sel.id?{...c,...editCustData}:c));setSel({...sel,...editCustData});setEditingCust(false);}}>✅ שמור</Btn>
              <Btn sm v="ghost" onClick={()=>setEditingCust(false)}>ביטול</Btn>
            </div>}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <Badge status={sel.status}/>
        <span style={{fontSize:13,color:CLR.muted}}>{sel.phone}</span>
        {sel.email&&<span style={{fontSize:13,color:CLR.muted}}>| {sel.email}</span>}
        {isArchived(sel)&&<span style={{background:"#fef9c3",color:"#92400e",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600}}>📦 בארכיון</span>}
        {sel.source&&<span style={{background:"#ede9fe",color:"#6d28d9",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600}}>📣 {sel.source}</span>}
        <select value={sel.tag||""} onChange={e=>{const tag=e.target.value;setCustomers(cs=>cs.map(c=>c.id===sel.id?{...c,tag}:c));setSel({...sel,tag});}}
          style={{padding:"2px 8px",borderRadius:20,border:"1px solid #e5e7eb",fontSize:11,cursor:"pointer",background:"#f9fafb"}}>
          <option value="">🏷️ תגית</option>

        </select>
        <button onClick={()=>{setCustomers(cs=>cs.map(c=>c.id===sel.id?{...c,archived:!isArchived(c)}:c));setSel(null);}}
          style={{padding:"3px 10px",borderRadius:8,border:"1px solid "+(isArchived(sel)?"#86efac":"#fcd34d"),background:isArchived(sel)?"#dcfce7":"#fef9c3",color:isArchived(sel)?"#166534":"#92400e",fontSize:11,cursor:"pointer",fontWeight:600}}>
          {isArchived(sel)?"↩️ הוצא מארכיון":"📦 העבר לארכיון"}
        </button>
      </div>
      <G2 gap={8}>{[
        ["📍 כתובת",sel.address],
        ["🏢 סוג נכס",sel.propertyType],
        ["🚪 חדרים",sel.rooms||"—"],
        ["📊 קומה",sel.floor||"—"],
        ["🔢 דירה",sel.aptNum||"—"],
        ["🌳 חצר",sel.hasYard?"יש":"אין"],
        ["🐛 מזיק אחרון",sel.pestType||"טרם נקבע"],
        ["💰 סה״כ שולם",`₪${sel.totalPaid}`],
      ].map(([ic,val])=>(
        <div key={ic} style={{background:CLR.surface,borderRadius:8,padding:"8px 12px",fontSize:13}}>
          <div style={{fontSize:11,color:CLR.muted,marginBottom:2}}>{ic}</div>
          <div style={{fontWeight:500}}>{val}</div>
        </div>
      ))}</G2>
      {(()=>{
        const custFinance=finance.filter(f=>f.customerId===sel.id);
        const totalDebt=custFinance.filter(f=>f.status==="חוב").reduce((s,f)=>s+f.amount,0);
        const pendingAppts=appointments.filter(a=>a.customerId===sel.id&&a.status!=="בוצע"&&a.status!=="בוטל");
        const pendingValue=pendingAppts.reduce((s,a)=>s+a.price,0);
        return <>
          {totalDebt>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 14px",margin:"8px 0",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>⚠️ <b>חוב פתוח:</b></span>
            <span style={{fontWeight:700,color:CLR.danger,fontSize:15}}>₪{totalDebt.toLocaleString()}</span>
          </div>}
          {pendingValue>0&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 14px",margin:"8px 0",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>📅 <b>תורים עתידיים ({pendingAppts.length}):</b></span>
            <span style={{fontWeight:700,color:CLR.info,fontSize:15}}>₪{pendingValue.toLocaleString()}</span>
          </div>}
        </>;
      })()}
      {sel.notes&&<div style={{background:"#fef9c3",borderRadius:8,padding:"10px 14px",margin:"12px 0",fontSize:13}}>⚠️ <b>הערות:</b> {sel.notes}</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 8px"}}>
        <h3 style={{fontSize:14,color:CLR.primary,margin:0}}>📋 ציר זמן טיפולים</h3>
        {currentUser.role!=="מדביר"&&<Btn sm onClick={()=>{setSchedFor(sel);setSel(null);}}>📅 שבץ תור ליומן</Btn>}
      </div>
      {(()=>{
        const custAppts=[...appointments.filter(a=>a.customerId===sel.id)].sort((a,b)=>a.date.localeCompare(b.date));
        if(custAppts.length>=2){
          const maxP=Math.max(...custAppts.map(a=>a.price),1);
          const totalSpent=custAppts.filter(a=>a.status==="בוצע").reduce((s,a)=>s+a.price,0);
          return <div style={{background:CLR.primaryLight,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:600,color:CLR.primary}}>📈 היסטוריית מחירים</span>
              <span style={{fontSize:12,color:CLR.muted}}>סה"כ שולם: <b style={{color:CLR.primary}}>₪{totalSpent.toLocaleString()}</b></span>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
              {custAppts.slice(-10).map((a,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}} title={fmtDate(a.date)+" · ₪"+a.price+" · "+a.pestType}>
                  <div style={{width:"100%",background:a.status==="בוצע"?CLR.primary:"#d1d5db",borderRadius:"3px 3px 0 0",height:Math.max(4,Math.round((a.price/maxP)*52))+"px",cursor:"default"}}/>
                  <div style={{fontSize:8,color:CLR.muted,overflow:"hidden",width:"100%",textAlign:"center",whiteSpace:"nowrap"}}>{a.price>0?"₪"+a.price:""}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:10,color:CLR.muted,marginTop:4}}>ירוק = בוצע · אפור = לא בוצע · העבר עכבר לפרטים</div>
          </div>;
        }
        return null;
      })()}
      {(()=>{
        const allAppts=[...appointments.filter(a=>a.customerId===sel.id)].sort((a,b)=>b.date.localeCompare(a.date));
        if(allAppts.length===0) return <p style={{color:CLR.muted,fontSize:13}}>אין טיפולים — לחץ "שבץ תור ליומן" כדי לקבוע</p>;
        const statusColor={ממתין:"#f59e0b",בוצע:"#16a34a",בדרך:"#2563eb",בוטל:"#9ca3af"};
        return <div style={{position:"relative"}}>
          {/* Vertical line */}
          <div style={{position:"absolute",right:15,top:8,bottom:8,width:2,background:"#e5e7eb",zIndex:0}}/>
          {allAppts.map((a,i)=>{
            const log=execLogs.find(l=>l.apptId===a.id);
            const inv=finance.find(f=>f.apptId===a.id);
            const color=statusColor[a.status]||"#9ca3af";
            const isFuture=a.date>todayStr();
            return <div key={a.id} style={{display:"flex",gap:12,marginBottom:16,position:"relative",zIndex:1}}>
              {/* Timeline dot */}
              <div style={{flexShrink:0,width:30,display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:color,border:"2px solid #fff",boxShadow:"0 0 0 2px "+color,marginTop:4}}/>
              </div>
              {/* Card */}
              <div style={{flex:1,background:isFuture?"#f0f9f4":CLR.white,border:"1px solid "+(isFuture?"#86efac":CLR.border),borderRadius:10,padding:"10px 14px",marginBottom:2}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#111"}}>{a.pestType}</div>
                    <div style={{fontSize:11,color:CLR.muted}}>{fmtDate(a.date)} {a.time&&"· "+a.time} · {a.workerName}</div>
                  </div>
                  <div style={{textAlign:"left",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <span style={{fontWeight:700,color:CLR.primary,fontSize:14}}>₪{a.price}</span>
                    <span style={{fontSize:10,color:color,fontWeight:600,background:color+"18",padding:"1px 7px",borderRadius:20}}>{a.status}</span>
                  </div>
                </div>
                {/* Execution log summary */}
                {log&&<div style={{borderTop:"1px dashed "+CLR.border,paddingTop:6,marginTop:6,fontSize:11,color:CLR.muted}}>
                  📋 {log.materials?.map(m=>m.name).join(", ")||"—"}
                  {log.warranty&&<span style={{marginRight:8}}>· אחריות {log.warranty} חו'</span>}
                  {log.extermination_notes&&<span style={{marginRight:8}}>· {log.extermination_notes.slice(0,40)}</span>}
                </div>}
                {/* Invoice */}
                {inv&&<div style={{borderTop:"1px dashed "+CLR.border,paddingTop:6,marginTop:6,fontSize:11,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:CLR.primary}}>🧾 {inv.invoiceNum} · {inv.payMethod||""}</span>
                  <span style={{color:inv.status==="שולם"?"#16a34a":CLR.danger,fontWeight:600}}>{inv.status}</span>
                </div>}
                {/* Actions */}
                <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                  {a.status==="בוצע"&&!inv&&<Btn sm v="accent" onClick={()=>setInvAppt(a)}>🧾 הפק חשבונית</Btn>}
                  {inv&&<button onClick={()=>printInvoice(inv)} style={{padding:"3px 10px",borderRadius:6,border:"1px solid "+CLR.border,background:"#f9fafb",fontSize:11,cursor:"pointer",color:CLR.primary}}>📄 PDF</button>}
                </div>
              </div>
            </div>;
          })}
        </div>;
      })()}
    </Modal>}
    {showNew&&<NewCustomerModal onClose={()=>setShowNew(false)} workers={workers} customers={customers}
      onSave={c=>{const saved={...c,id:nextId(customers)};setCustomers(cs=>[...cs,saved]);return saved;}}
      onSchedule={appt=>setAppointments(as=>[...as,{...appt,id:nextId(as)}])}/>}
    {showCalc&&<PriceCalc onClose={()=>setShowCalc(false)} onDone={()=>setShowCalc(false)}/>}
    {schedFor&&<NewApptModal customers={customers} workers={workers} collabs={collabs}
      prefill={{customerId:schedFor.id,address:schedFor.address,pestType:schedFor.pestType||"ג'וקים",price:schedFor.lastPrice||""}}
      onClose={()=>setSchedFor(null)}
      onSave={a=>{setAppointments(as=>[...as,{...a,id:nextId(as)}]);setSchedFor(null);}}/>}
    {invAppt&&<InvoiceModal appt={invAppt} customers={customers} onClose={()=>setInvAppt(null)} onSave={rec=>{setFinance(fs=>[...fs,{...rec,id:nextId(fs)}]);setInvAppt(null);setSel(null);}}/>}
  </div>;
}

// MESSAGE TEMPLATES

const TEMPLATE_VARS = ["שם","תאריך","שעה","מזיק","כתובת","מדביר","מחיר"];


// ════════════════════════════════════════════════════
// SCHEDULED MESSAGES
// ════════════════════════════════════════════════════
function ScheduledMsgs({scheduled,setScheduled,customers,appointments,templates}){
  const [showNew,setShowNew]=useState(false);
  const [newMsg,setNewMsg]=useState({name:"",phone:"",text:"",sendDate:"",sendTime:"09:00",apptId:"",templateId:""});
  const setN=(k,v)=>setNewMsg(x=>({...x,[k]:v}));

  // Check for due messages on mount and periodically
  React.useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const nowISO=now.toISOString().slice(0,16); // "YYYY-MM-DDTHH:MM"
      setScheduled(msgs=>msgs.map(m=>{
        if(m.status==="ממתין"&&m.sendDate&&m.sendDate+"T"+m.sendTime<=nowISO){
          return {...m,status:"מוכן לשליחה"};
        }
        return m;
      }));
    };
    check();
    const interval=setInterval(check,60000); // check every minute
    return()=>clearInterval(interval);
  },[]);

  const pending=scheduled.filter(m=>m.status==="ממתין");
  const ready=scheduled.filter(m=>m.status==="מוכן לשליחה");
  const sent=scheduled.filter(m=>m.status==="נשלח");

  const addMsg=()=>{
    if(!newMsg.name||!newMsg.phone||!newMsg.text||!newMsg.sendDate) return alert("שם, טלפון, הודעה ותאריך — חובה");
    setScheduled(ms=>[...ms,{...newMsg,id:Date.now(),status:"ממתין",createdAt:todayStr()}]);
    setNewMsg({name:"",phone:"",text:"",sendDate:"",sendTime:"09:00",apptId:"",templateId:""});
    setShowNew(false);
  };

  const markSent=id=>setScheduled(ms=>ms.map(m=>m.id===id?{...m,status:"נשלח"}:m));

  const fillFromAppt=apptId=>{
    const a=appointments.find(x=>x.id===parseInt(apptId));
    const c=a?customers.find(x=>x.id===a.customerId):null;
    if(a&&c) setNewMsg(prev=>({...prev,name:c.name,phone:c.phone||"",apptId}));
  };

  const fillFromTemplate=tplId=>{
    const t=templates.find(x=>x.id===parseInt(tplId));
    if(t) setNewMsg(prev=>({...prev,text:t.text,templateId:tplId}));
  };

  const statusColor={ממתין:"#fef9c3","מוכן לשליחה":"#dcfce7",נשלח:"#f3f4f6"};
  const statusText={ממתין:"#854d0e","מוכן לשליחה":"#166534",נשלח:"#6b7280"};

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h2 style={{color:CLR.primary,fontSize:17,margin:"0 0 4px"}}>⏰ הודעות מתוזמנות</h2>
        <p style={{color:CLR.muted,fontSize:13,margin:0}}>תזמן הודעות WhatsApp לשליחה בזמן עתידי</p>
      </div>
      <Btn sm onClick={()=>setShowNew(s=>!s)}>{showNew?"✕ סגור":"+ הודעה חדשה"}</Btn>
    </div>

    {/* Stats */}
    <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
      <StatCard label="ממתינות" value={pending.length} bg="#fef9c3"/>
      <StatCard label="מוכנות לשליחה" value={ready.length} bg="#dcfce7"/>
      <StatCard label="נשלחו" value={sent.length}/>
    </div>

    {/* New message form */}
    {showNew&&<div style={{background:CLR.white,border:"2px solid "+CLR.primary,borderRadius:14,padding:"20px 22px",marginBottom:16}}>
      <div style={{fontWeight:700,color:CLR.primary,fontSize:15,marginBottom:14}}>+ הודעה חדשה</div>
      <G2>
        <Inp label="שם הנמען" value={newMsg.name} onChange={v=>setN("name",v)} placeholder="שם הלקוח"/>
        <Inp label="טלפון" value={newMsg.phone} onChange={v=>setN("phone",v)} placeholder="05X-XXXXXXX"/>
        <Inp label="תאריך שליחה" type="date" value={newMsg.sendDate} onChange={v=>setN("sendDate",v)}/>
        <Sel label="שעת שליחה" value={newMsg.sendTime} onChange={v=>setN("sendTime",v)} options={["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"]}/>
      </G2>
      <G2>
        <div><label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:4}}>קשר לתור (אופציונלי)</label>
          <select value={newMsg.apptId} onChange={e=>fillFromAppt(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,boxSizing:"border-box"}}>
            <option value="">-- בחר תור --</option>
            {appointments.filter(a=>a.status!=="בוטל").slice(0,20).map(a=>(
              <option key={a.id} value={a.id}>{a.customerName} · {a.pestType} · {fmtDate(a.date)}</option>
            ))}
          </select></div>
        <div><label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:4}}>השתמש בתבנית</label>
          <select value={newMsg.templateId} onChange={e=>fillFromTemplate(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,boxSizing:"border-box"}}>
            <option value="">-- בחר תבנית --</option>
            {templates.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.name}</option>)}
          </select></div>
      </G2>
      <Txt label="תוכן ההודעה" value={newMsg.text} onChange={v=>setN("text",v)} rows={4} placeholder="תוכן ההודעה..."/>
      <div style={{display:"flex",gap:10}}>
        <Btn full onClick={addMsg}>✅ תזמן הודעה</Btn>
        <Btn v="ghost" onClick={()=>setShowNew(false)}>ביטול</Btn>
      </div>
    </div>}

    {/* Ready to send — highlighted */}
    {ready.length>0&&<div style={{background:"#f0fdf4",border:"2px solid #86efac",borderRadius:12,padding:"14px 18px",marginBottom:16}}>
      <div style={{fontWeight:700,color:"#166534",marginBottom:10,fontSize:14}}>🔔 מוכנות לשליחה עכשיו ({ready.length})</div>
      {ready.map(m=>(
        <div key={m.id} style={{background:"#fff",borderRadius:8,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid #86efac"}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{m.name} · {m.phone}</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{fmtDate(m.sendDate)} {m.sendTime} · {m.text.slice(0,50)}...</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <a href={"https://wa.me/"+(m.phone||"").replace(/[^0-9]/g,"").replace(/^0/,"972")+"?text="+encodeURIComponent(m.text)}
              target="_blank" rel="noopener"
              onClick={()=>setTimeout(()=>markSent(m.id),1000)}
              style={{padding:"6px 14px",borderRadius:8,background:"#166534",color:"#fff",fontWeight:600,fontSize:13,textDecoration:"none"}}>
              💬 שלח עכשיו
            </a>
            <button onClick={()=>setScheduled(ms=>ms.filter(x=>x.id!==m.id))} style={{padding:"6px 10px",borderRadius:8,border:"none",background:"#fee2e2",color:CLR.danger,cursor:"pointer",fontSize:12}}>✕</button>
          </div>
        </div>
      ))}
    </div>}

    {/* All messages list */}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {[...pending,...sent].map(m=>(
        <div key={m.id} style={{background:CLR.white,border:"1px solid "+CLR.border,borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{m.name} · {m.phone}</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>📅 {fmtDate(m.sendDate)} · 🕐 {m.sendTime}</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:1}}>{m.text.slice(0,60)}{m.text.length>60?"...":""}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <span style={{background:statusColor[m.status],color:statusText[m.status],padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600}}>{m.status}</span>
            <button onClick={()=>{if(window.confirm("למחוק?"))setScheduled(ms=>ms.filter(x=>x.id!==m.id));}} style={{background:"none",border:"none",color:CLR.danger,cursor:"pointer",fontSize:11}}>מחק</button>
          </div>
        </div>
      ))}
      {scheduled.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:CLR.muted,fontSize:14}}>
        <div style={{fontSize:40,marginBottom:10}}>⏰</div>
        אין הודעות מתוזמנות עדיין
      </div>}
    </div>
  </div>;
}
function MsgTemplates({templates,setTemplates,customers,appointments}){
  const [editing,setEditing]=useState(null); // null | template object
  const [preview,setPreview]=useState(null); // {template, appt, customer}
  const [sendAppt,setSendAppt]=useState(null);
  const [newTpl,setNewTpl]=useState({name:"",emoji:"💬",text:""});

  const fillTemplate=(text,appt,cust)=>{
    const d=appt?.date?appt.date.split("-"):"";
    return text
      .replace(/\{שם\}/g, cust?.name||appt?.customerName||"הלקוח")
      .replace(/\{תאריך\}/g, appt?.date?`${d[2]}/${d[1]}/${d[0]}`:"")
      .replace(/\{שעה\}/g, appt?.timeWindow||appt?.time||"")
      .replace(/\{מזיק\}/g, appt?.pestType||"")
      .replace(/\{כתובת\}/g, appt?.address||cust?.address||"")
      .replace(/\{מדביר\}/g, appt?.workerName||"")
      .replace(/\{מחיר\}/g, appt?.price?"₪"+appt.price:"");
  };

  const saveTemplate=tpl=>{
    if(tpl.id){
      setTemplates(ts=>ts.map(t=>t.id===tpl.id?tpl:t));
    } else {
      setTemplates(ts=>[...ts,{...tpl,id:Date.now()}]);
    }
    setEditing(null);
  };

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div>
        <h2 style={{color:CLR.primary,fontSize:17,margin:"0 0 4px"}}>💬 תבניות הודעה</h2>

          <div style={{background:"#f9fafb",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#374151",whiteSpace:"pre-wrap",lineHeight:1.6,maxHeight:120,overflowY:"auto",marginBottom:12}}>

            <button onClick={()=>setSendAppt({template:t,apptId:"",custId:""})}

          </div>
        </div>

    {editing!==null&&<div style={{background:CLR.white,border:"2px solid "+CLR.primary,borderRadius:14,padding:"20px 22px",marginBottom:16}}>

      <G2>
        <Inp label="שם התבנית" value={editing.name} onChange={v=>setEditing(e=>({...e,name:v}))} placeholder="תזכורת, אישור..."/>
        <div><label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:4}}>אימוג'י</label>
          <select value={editing.emoji} onChange={e=>setEditing(t=>({...t,emoji:e.target.value}))}

            {["💬","📅","✅","🙏","💳","🦟","⚠️","📋","🔁","💰"].map(e=><option key={e} value={e}>{e}</option>)}
          </select></div>
      </G2>
      <Txt label="תוכן ההודעה (השתמש במשתנים למעלה)" value={editing.text} onChange={v=>setEditing(e=>({...e,text:v}))} rows={5} placeholder="שלום *{שם}* 👋..."/>
      <div style={{display:"flex",gap:10}}>
        <Btn full onClick={()=>{ if(!editing.name||!editing.text)return alert("שם ותוכן חובה"); saveTemplate(editing); }}>✅ שמור תבנית</Btn>
        <Btn v="ghost" onClick={()=>setEditing(null)}>ביטול</Btn>

    {/* Send to customer modal */}
    {sendAppt&&<Modal title={"💬 שליחת תבנית: "+sendAppt.template.name} onClose={()=>setSendAppt(null)} width={520}>
      <div style={{marginBottom:14}}>
        <label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:6}}>בחר תור (אופציונלי — למילוי אוטומטי)</label>
        <select value={sendAppt.apptId} onChange={e=>{
          const a=appointments.find(x=>x.id===parseInt(e.target.value));
          const c=a?customers.find(x=>x.id===a.customerId):null;
          setSendAppt(p=>({...p,apptId:e.target.value,appt:a||null,cust:c||null,custId:c?.id||""}));
        }} style={{width:"100%",padding:"9px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,boxSizing:"border-box"}}>
          <option value="">-- בחר תור (אופציונלי) --</option>
          {appointments.filter(a=>a.status!=="בוטל").sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30).map(a=>(
            <option key={a.id} value={a.id}>{a.customerName} · {a.pestType} · {fmtDate(a.date)}</option>
          ))}
        </select>
      </div>
      {!sendAppt.apptId&&<div style={{marginBottom:14}}>
        <label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:6}}>או בחר לקוח ישירות</label>
        <select value={sendAppt.custId||""} onChange={e=>{
          const c=customers.find(x=>x.id===parseInt(e.target.value));
          setSendAppt(p=>({...p,custId:e.target.value,cust:c||null}));
        }} style={{width:"100%",padding:"9px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,boxSizing:"border-box"}}>
          <option value="">-- בחר לקוח --</option>
          {customers.map(c=><option key={c.id} value={c.id}>{c.name} · {c.phone}</option>)}
        </select>
      </div>}
      {(sendAppt.appt||sendAppt.cust)&&(()=>{
        const cust=sendAppt.cust||customers.find(c=>c.id===sendAppt.appt?.customerId);
        const text=fillTemplate(sendAppt.template.text,sendAppt.appt,cust);
        const phone=(cust?.phone||"").replace(/[^0-9]/g,"").replace(/^0/,"972");
        return <div>
          <div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,padding:"14px",marginBottom:14,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:220,overflowY:"auto"}}>{text}</div>
          <div style={{display:"flex",gap:10}}>
            {phone&&<a href={"https://wa.me/"+phone+"?text="+encodeURIComponent(text)} target="_blank" rel="noopener" style={{flex:1,textDecoration:"none"}}><Btn full>💬 שלח בוואטסאפ</Btn></a>}
            <Btn v="secondary" onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(text);alert("הועתק!");}}>📋 העתק</Btn>
            <Btn v="ghost" onClick={()=>setSendAppt(null)}>סגור</Btn>
          </div>
        </div>;
      })()}
    </Modal>}
  </div>;
}
function Notes({notes,setNotes,currentUser,workers}){
  const [f,setF]=useState({title:"",content:"",private:currentUser.role==="מדביר"});
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const [fltWk,setFltWk]=useState("all");
  const visible=notes.filter(j=>{if(currentUser.role==="מדביר")return !j.private||(j.workerId===currentUser.id);if(fltWk==="private_only")return j.private;if(fltWk!=="all")return j.workerId===parseInt(fltWk)||!j.private;return true;});
  return <div>
    <div style={{background:CLR.white,border:`1px solid ${CLR.border}`,borderRadius:12,padding:20,marginBottom:18}}>
      <h3 style={{color:CLR.primary,fontSize:14,margin:"0 0 12px"}}>✏️ רשומה חדשה</h3>
      <Inp label="כותרת" value={f.title} onChange={v=>set("title",v)}/>
      <Txt label="תוכן" value={f.content} onChange={v=>set("content",v)} rows={3}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        {currentUser.role!=="מדביר"?<label style={{fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><input type="checkbox" checked={f.private} onChange={e=>set("private",e.target.checked)}/> 🔒 פרטי</label>:<span style={{fontSize:12,color:CLR.muted}}>🔒 פרטי שלי</span>}
        <Btn sm onClick={()=>{if(!f.title||!f.content)return alert("כותרת ותוכן חובה");setNotes(n=>[{id:nextId(n),date:todayStr(),type:f.private?"אישי":"כללי",author:currentUser.name,workerId:currentUser.role==="מדביר"?currentUser.id:null,title:f.title,content:f.content,private:f.private},...n]);setF({title:"",content:"",private:currentUser.role==="מדביר"});}}>+ הוסף</Btn>
      </div>
    </div>
    {currentUser.role!=="מדביר"&&<div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}><span style={{fontSize:13,color:CLR.muted}}>סנן:</span>
      <select value={fltWk} onChange={e=>setFltWk(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${CLR.border}`,fontSize:13}}>
        <option value="all">הכל</option><option value="private_only">פרטיות בלבד</option>
        {workers.filter(w=>w.role==="מדביר").map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
      </select></div>}
    {visible.map(j=><div key={j.id} style={{background:j.private?"#fef9c3":CLR.white,border:`1px solid ${CLR.border}`,borderRadius:12,padding:"14px 18px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",gap:8}}>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{j.title}</div><div style={{fontSize:11,color:CLR.muted,marginBottom:8}}>{fmtDate(j.date)} | {j.author}</div><div style={{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{j.content}</div></div>
        <div style={{display:"flex",gap:6}}>
          {j.private&&<span style={{background:"#fbbf24",color:"#92400e",padding:"2px 8px",borderRadius:20,fontSize:11}}>🔒</span>}
          <button onClick={()=>{if(window.confirm('למחוק הערה זו?'))setNotes(ns=>ns.filter(x=>x.id!==j.id));}} style={{background:"none",border:"none",color:CLR.muted,cursor:"pointer",fontSize:15}}>✕</button>
        </div>
      </div>
    </div>)}
  </div>;
}

// Standalone "חשבוניות" tab — history of invoices + create new
function StandaloneInvoiceModal({customers,appointments,onClose,onSave}){
  const [custId,setCustId]=useState("");
  const [apptId,setApptId]=useState("");
  const [desc,setDesc]=useState("");
  const [amount,setAmount]=useState("");
  const [payMethod,setPayMethod]=useState("מזומן");
  const [status,setStatus]=useState("שולם");
  const cust=customers.find(c=>c.id===parseInt(custId));
  const custAppts=appointments.filter(a=>a.customerId===parseInt(custId));
  const docNum=`INV-${String(Date.now()).slice(-5)}`;
  const amt=parseInt(amount)||0;
  const vat=Math.round(amt*0.18);
  const pickAppt=id=>{const a=appointments.find(x=>x.id===parseInt(id));setApptId(id);if(a){setAmount(String(a.price));setDesc(`הדברת ${a.pestType} – ${a.address}`);}};
  return <Modal title="🧾 חשבונית חדשה" onClose={onClose} width={540}>
    <div>
      <label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:4}}>לקוח *</label>
      <select value={custId} onChange={e=>{setCustId(e.target.value);setApptId("");}} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${CLR.border}`,fontSize:14,boxSizing:"border-box",marginBottom:12}}>
        <option value="">-- בחר לקוח --</option>{customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
    </div>
    {custId&&custAppts.length>0&&<div>
      <label style={{fontSize:13,color:CLR.muted,display:"block",marginBottom:4}}>קשר לטיפול (אופציונלי)</label>
      <select value={apptId} onChange={e=>pickAppt(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${CLR.border}`,fontSize:14,boxSizing:"border-box",marginBottom:12}}>
        <option value="">-- ללא / חשבונית חופשית --</option>
        {custAppts.map(a=><option key={a.id} value={a.id}>{a.pestType} · {fmtDate(a.date)} · ₪{a.price}</option>)}
      </select>
    </div>}
    <Inp label="תיאור השירות" value={desc} onChange={setDesc} placeholder="הדברת ג'וקים – רחוב הרצל 12"/>
    <G2>
      <Inp label="סכום לפני מע״מ (₪)" type="number" value={amount} onChange={setAmount}/>
      <Sel label="אמצעי תשלום" value={payMethod} onChange={setPayMethod} options={["מזומן","העברה בנקאית","ביט","PayBox","צ'ק","אשראי"]}/>
    </G2>
    <Sel label="סטטוס" value={status} onChange={setStatus} options={["שולם","חוב","ממתין"]}/>
    {amt>0&&<div style={{background:CLR.primaryLight,borderRadius:10,padding:"12px 16px",margin:"4px 0 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:CLR.muted}}>לפני מע"מ</span><span>₪{amt}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:CLR.muted}}><span>מע"מ 18%</span><span>₪{vat}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700,color:CLR.primary,borderTop:`1px solid ${CLR.border}`,marginTop:6,paddingTop:6}}><span>סה"כ</span><span>₪{amt+vat}</span></div>
    </div>}
    <div style={{display:"flex",gap:10}}>
      <Btn full onClick={()=>{
        if(!custId||!amt) return alert("בחר לקוח והזן סכום");
        const a=appointments.find(x=>x.id===parseInt(apptId));
        onSave({type:"הכנסה",category:"חשבונית",customer:cust.name,customerId:cust.id,amount:amt,date:todayStr(),status,invoiceNum:docNum,apptId:apptId?parseInt(apptId):null,phone:cust.phone||"",address:a?.address||cust.address||"",pestType:a?.pestType||desc,workerName:a?.workerName||"",payMethod});
        onClose();
      }}>✅ שמור חשבונית</Btn>
      <Btn v="secondary" onClick={()=>{if(!cust||!amt)return alert("בחר לקוח והזן סכום");const a=appointments.find(x=>x.id===parseInt(apptId));printInvoice({invoiceNum:docNum,date:todayStr(),customer:cust.name,phone:cust.phone||"",address:a?.address||cust.address||"",pestType:a?.pestType||desc,workerName:a?.workerName||"",amount:amt,payMethod});}}>📄 PDF</Btn>
      <Btn v="ghost" onClick={onClose}>ביטול</Btn>
    </div>
  </Modal>;
}

function Invoices({finance,setFinance,customers,appointments}){
  const [showNew,setShowNew]=useState(false);
  const [statusF,setStatusF]=useState("הכל");
  const [srch,setSrch]=useState("");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const invoices=finance.filter(f=>f.category==="חשבונית");
  const filtered=invoices.filter(f=>{
    if(statusF!=="הכל"&&f.status!==statusF) return false;
    if(srch){
      const q=srch.toLowerCase();
      if(!(f.customer||"").toLowerCase().includes(q)&&
         !(f.invoiceNum||"").toLowerCase().includes(q)&&
         !(f.pestType||"").toLowerCase().includes(q)&&
         !String(f.amount).includes(q)) return false;
    }
    if(dateFrom&&(f.date||"")<dateFrom) return false;
    if(dateTo&&(f.date||"")>dateTo) return false;
    return true;
  });
  const total=invoices.reduce((s,f)=>s+f.amount,0);
  const paid=invoices.filter(f=>f.status==="שולם").reduce((s,f)=>s+f.amount,0);
  const debt=invoices.filter(f=>f.status==="חוב").reduce((s,f)=>s+f.amount,0);
  return <div>
    <div style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap"}}>
      <StatCard label="סה״כ חשבוניות" value={invoices.length}/>
      <StatCard label="סכום כולל" value={`₪${total}`} bg="#dbeafe"/>
      <StatCard label="שולם" value={`₪${paid}`} bg="#dcfce7"/>
      <StatCard label="חוב פתוח" value={`₪${debt}`} bg="#fee2e2"/>
    </div>
    {/* Search bar */}
    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
      <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="🔍 חפש לקוח, מספר חשבונית, שירות..."
        style={{flex:2,minWidth:200,padding:"8px 14px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,background:"#f9fafb",boxSizing:"border-box"}}/>
      <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} title="מתאריך"
        style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,boxSizing:"border-box"}}/>
      <span style={{color:CLR.muted,fontSize:13}}>—</span>
      <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} title="עד תאריך"
        style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,boxSizing:"border-box"}}/>
      {(srch||dateFrom||dateTo)&&<button onClick={()=>{setSrch("");setDateFrom("");setDateTo("");}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #fca5a5",background:"#fee2e2",color:CLR.danger,cursor:"pointer",fontSize:12,fontWeight:600}}>✕ נקה</button>}
      <span style={{fontSize:12,color:CLR.muted}}>{filtered.length} חשבוניות</span>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      {["הכל","שולם","חוב","ממתין"].map(t=><button key={t} onClick={()=>setStatusF(t)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${statusF===t?CLR.primary:CLR.border}`,background:statusF===t?CLR.primary:"transparent",color:statusF===t?"#fff":CLR.muted,cursor:"pointer",fontWeight:600,fontSize:13}}>{t}</button>)}
      <div style={{flex:1}}/>
      <Btn sm v="secondary" onClick={()=>exportInvoices(finance)}>📥 ייצא Excel</Btn>
      <Btn sm onClick={()=>setShowNew(true)}>+ חשבונית חדשה</Btn>
    </div>
    <div style={{background:CLR.white,border:`1px solid ${CLR.border}`,borderRadius:12,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr style={{background:CLR.surface}}>{["מס׳ חשבונית","תאריך","לקוח","שירות","סכום","מע״מ","סה״כ","סטטוס",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"right",fontWeight:600,color:CLR.muted,borderBottom:`1px solid ${CLR.border}`}}>{h}</th>)}</tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={9} style={{padding:24,textAlign:"center",color:CLR.muted}}>אין חשבוניות</td></tr>}
          {filtered.map(f=>{const vat=Math.round(f.amount*0.18);return <tr key={f.id} style={{borderBottom:`1px solid ${CLR.border}`}}>
            <td style={{padding:"9px 12px",color:CLR.info,fontWeight:600}}>{f.invoiceNum||"—"}</td>
            <td style={{padding:"9px 12px"}}>{fmtDate(f.date)}</td>
            <td style={{padding:"9px 12px"}}>{f.customer||"—"}</td>
            <td style={{padding:"9px 12px",color:CLR.muted,fontSize:12}}>{f.pestType||"—"}</td>
            <td style={{padding:"9px 12px"}}>₪{f.amount}</td>
            <td style={{padding:"9px 12px",color:CLR.muted}}>₪{vat}</td>
            <td style={{padding:"9px 12px",fontWeight:700,color:CLR.primary}}>₪{f.amount+vat}</td>
            <td style={{padding:"9px 12px"}}><Badge status={f.status}/></td>
            <td style={{padding:"9px 12px",display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>printInvoice(f)} title="הדפס/PDF" style={{background:"none",border:`1px solid ${CLR.border}`,borderRadius:6,padding:"3px 8px",fontSize:12,cursor:"pointer",color:CLR.primary}}>📄</button>
              {f.status!=="שולם"&&<button onClick={()=>setFinance(fs=>fs.map(x=>x.id===f.id?{...x,status:"שולם"}:x))} title="סמן כשולם" style={{background:"none",border:`1px solid ${CLR.border}`,borderRadius:6,padding:"3px 8px",fontSize:12,cursor:"pointer",color:"#16a34a"}}>💰</button>}
              <button onClick={()=>{if(window.confirm("למחוק?"))setFinance(fs=>fs.filter(x=>x.id!==f.id));}} style={{background:"none",border:"none",color:CLR.danger,cursor:"pointer"}}>✕</button>
            </td>
          </tr>;})}

function Maintenance({maintenance,setMaintenance,customers}){
  const [showNew,setShowNew]=useState(false);
  const [filter,setFilter]=useState("הכל");
  const items=maintenance.filter(m=>filter==="הכל"||m.status===filter);
  const active=maintenance.filter(m=>m.status==="פעיל");
  const totalMonthly=active.reduce((s,m)=>{
    const prices={["פעמיים בשבוע"]:8,["פעם בשבוע"]:4,["אחזקה חודשית"]:1,["כל חודשיים"]:0.5,["רבעוני (כל 3 חודשים)"]:0.33,["כל 6 חודשים"]:0.17,["שנתי"]:0.083};
    return s+(parseInt(m.price)||0)*(prices[m.frequency]||1);
  },0);
  const statusColor={פעיל:"#dcfce7",מושהה:"#fef9c3",הסתיים:"#f3f4f6"};
  const statusText={פעיל:"#166534",מושהה:"#854d0e",הסתיים:"#374151"};
  return <div>
    <div style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap"}}>
      <StatCard label="חוזים פעילים" value={active.length} bg="#dcfce7"/>

    </div>
    <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
      {["הכל","פעיל","מושהה","הסתיים"].map(t=>(

      ))}
      <div style={{flex:1}}/>
      <Btn sm onClick={()=>setShowNew(true)}>+ חוזה אחזקה חדש</Btn>
    </div>
    {items.length===0?<div style={{textAlign:"center",color:CLR.muted,padding:40}}>אין חוזי אחזקה עדיין</div>:
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
      {items.map(m=>(
        <div key={m.id} style={{background:CLR.white,border:`1px solid #d1d5db`,borderRadius:12,padding:"16px 18px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:"#111",marginBottom:2}}>{m.customerName}</div>
              <div style={{fontSize:12,color:CLR.muted}}>{m.address}</div>
            </div>
            <span style={{background:statusColor[m.status]||"#f3f4f6",color:statusText[m.status]||"#374151",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{m.status}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12,marginBottom:10}}>
            <div style={{background:CLR.surface,borderRadius:6,padding:"6px 8px"}}><span style={{color:CLR.muted}}>סוג: </span>{m.type}</div>
            <div style={{background:CLR.surface,borderRadius:6,padding:"6px 8px"}}><span style={{color:CLR.muted}}>תדירות: </span>{m.frequency}</div>
            {m.pests&&<div style={{background:CLR.surface,borderRadius:6,padding:"6px 8px"}}><span style={{color:CLR.muted}}>מזיקים: </span>{m.pests}</div>}
            {m.price&&<div style={{background:CLR.primaryLight,borderRadius:6,padding:"6px 8px",fontWeight:700,color:CLR.primary}}><span style={{fontWeight:400,color:CLR.muted}}>מחיר: </span>₪{m.price}</div>}
          </div>
          {m.notes&&<div style={{fontSize:12,color:CLR.muted,marginBottom:8}}>📝 {m.notes}</div>}
          <div style={{display:"flex",gap:6,justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:CLR.muted}}>מ-{fmtDate(m.startDate)}</span>
            <div style={{display:"flex",gap:6}}>
              <select value={m.status} onChange={e=>setMaintenance(ms=>ms.map(x=>x.id===m.id?{...x,status:e.target.value}:x))} style={{fontSize:12,padding:"4px 6px",borderRadius:6,border:`1px solid ${CLR.border}`,background:"#fff"}}>
                {["פעיל","מושהה","הסתיים"].map(s=><option key={s}>{s}</option>)}
              </select>
              <button type="button" onClick={()=>{if(window.confirm(`למחוק חוזה של ${m.customerName}?`))setMaintenance(ms=>ms.filter(x=>x.id!==m.id));}} style={{background:"none",border:"none",color:CLR.danger,cursor:"pointer",fontSize:12}}>מחק</button>
            </div>

        </div>
      ))}

    {showNew&&<MaintenanceModal onClose={()=>setShowNew(false)} onSave={m=>setMaintenance(ms=>[...ms,m])} customers={customers}/>}

function NewProjectModal({onClose,onSave,workers}){
  const [f,setF]=useState({name:"",clientName:"",phone:"",pestType:"כללי",status:"תכנון",notes:"",startDate:todayStr(),totalPrice:""});
  const [buildings,setBuildings]=useState([{id:1,address:"",buildingCode:"",floors:"",workerId:"",workerName:"",date:"",price:"",status:"ממתין"}]);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const addBuilding=()=>setBuildings(bs=>[...bs,{id:nextId(bs),address:"",buildingCode:"",floors:"",workerId:"",workerName:"",date:"",price:"",status:"ממתין"}]);
  const updateB=(id,data)=>setBuildings(bs=>bs.map(b=>b.id===id?data:b));
  const removeB=(id)=>setBuildings(bs=>bs.filter(b=>b.id!==id));
  const totalCalc=buildings.reduce((s,b)=>s+(parseInt(b.price)||0),0);

  return <Modal title="🏗️ פרויקט חדש" onClose={onClose} width={720}>
    <FieldCard title="פרטי הפרויקט">
      <G2><Inp label="שם הפרויקט *" value={f.name} onChange={v=>set("name",v)} placeholder="פרויקט ברחוב הרצל..."/><Sel label="סטטוס" value={f.status} onChange={v=>set("status",v)} options={PROJECT_STATUSES}/></G2>
      <G2><Inp label="שם לקוח / ועד" value={f.clientName} onChange={v=>set("clientName",v)}/><Inp label="טלפון" value={f.phone} onChange={v=>set("phone",v)}/></G2>
      <G2><Sel label="סוג מזיק" value={f.pestType} onChange={v=>set("pestType",v)} options={PROJECT_PEST_TYPES}/><Inp label="תאריך התחלה" type="date" value={f.startDate} onChange={v=>set("startDate",v)}/></G2>
      <Txt label="תיאור / הערות" value={f.notes} onChange={v=>set("notes",v)} rows={2}/>
    </FieldCard>

    <FieldCard title={`בניינים בפרויקט (${buildings.length})`} extra={totalCalc>0?`סה״כ: ₪${totalCalc}`:""}>
      {buildings.map(b=>(
        <ProjectBuildingRow key={b.id} b={b} workers={workers}
          onUpdate={data=>updateB(b.id,data)} onRemove={()=>removeB(b.id)} onSchedule={()=>{}}/>
      ))}
      <button type="button" onClick={addBuilding}
        style={{width:"100%",padding:"10px",borderRadius:10,border:`2px dashed ${CLR.primary}44`,background:"transparent",color:CLR.primary,cursor:"pointer",fontSize:14,fontWeight:600,marginTop:4}}>
        + הוסף בניין לפרויקט

    <div style={{display:"flex",gap:10}}>
      <Btn full onClick={()=>{if(!f.name)return alert("שם פרויקט חובה");onSave({...f,id:Date.now(),buildings,totalPrice:totalCalc||parseInt(f.totalPrice)||0});onClose();}}>✅ שמור פרויקט</Btn>
      <Btn v="ghost" onClick={onClose}>ביטול</Btn>
    </div>
  </Modal>;
}

function Projects({projects,setProjects,workers,appointments,setAppointments,customers,setCustomers}){
  const [showNew,setShowNew]=useState(false);
  const [openProject,setOpenProject]=useState(null);
  const [filter,setFilter]=useState("הכל");

  const updateProject=(id,data)=>setProjects(ps=>ps.map(p=>p.id===id?data:p));
  const updateBuilding=(projId,bid,data)=>{
    setProjects(ps=>ps.map(p=>p.id===projId?{...p,buildings:p.buildings.map(b=>b.id===bid?data:b)}:p));
  };
  const scheduleBuilding=(proj,b)=>{
    if(!b.workerId||!b.date){alert("צריך מדביר ותאריך לשיגור");return;}
    const appt={id:nextId(appointments),customerId:null,customerName:proj.clientName||proj.name,workerId:parseInt(b.workerId),workerName:b.workerName,date:b.date,time:"09:00",timeWindow:"09:00–17:00",pestType:proj.pestType,pests:[proj.pestType],price:parseInt(b.price)||0,address:b.address,notes:`פרויקט: ${proj.name}${b.buildingCode?` | קוד: ${b.buildingCode}`:""}`,buildingAreas:[],status:"ממתין",projectId:proj.id,buildingId:b.id};
    setAppointments(as=>[...as,appt]);
    updateBuilding(proj.id,b.id,{...b,status:"שובץ"});
    alert(`✅ בניין "${b.address||b.id}" שוגר ליומן של ${b.workerName} ב-${fmtDate(b.date)}`);
  };

  const filtered=projects.filter(p=>filter==="הכל"||p.status===filter);
  const totalBuildings=projects.reduce((s,p)=>s+(p.buildings||[]).length,0);
  const activeProj=projects.filter(p=>p.status==="פעיל").length;
  const totalValue=projects.reduce((s,p)=>s+(p.totalPrice||0),0);

  return <div>
    <div style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap"}}>
      <StatCard label="פרויקטים פעילים" value={activeProj} bg="#dcfce7"/>
      <StatCard label='סה"כ פרויקטים' value={projects.length}/>
      <StatCard label="בניינים" value={totalBuildings} bg="#dbeafe"/>
      <StatCard label="שווי כולל" value={`₪${totalValue.toLocaleString()}`} bg="#fef9c3"/>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
      {["הכל",...PROJECT_STATUSES].map(s=>(
        <button key={s} type="button" onClick={()=>setFilter(s)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${filter===s?CLR.primary:CLR.border}`,background:filter===s?CLR.primary:"transparent",color:filter===s?"#fff":CLR.muted,cursor:"pointer",fontWeight:600,fontSize:13}}>{s}</button>
      ))}
      <div style={{flex:1}}/>
      <Btn sm onClick={()=>setShowNew(true)}>+ פרויקט חדש</Btn>
    </div>

    {filtered.length===0&&<div style={{textAlign:"center",color:CLR.muted,padding:60,fontSize:15}}>אין פרויקטים עדיין</div>}

    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {filtered.map(proj=>{
        const doneCount=(proj.buildings||[]).filter(b=>b.status==="בוצע").length;
        const total=(proj.buildings||[]).length;
        const progress=total?Math.round(doneCount/total*100):0;
        const isOpen=openProject===proj.id;
        return <div key={proj.id} style={{background:CLR.white,border:`1px solid #d1d5db`,borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
          {/* Header */}
          <div style={{padding:"16px 20px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",background:isOpen?CLR.primaryLight:"#fff"}} onClick={()=>setOpenProject(isOpen?null:proj.id)}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:16,color:"#111",marginBottom:3}}>🏗️ {proj.name}</div>
              <div style={{fontSize:13,color:CLR.muted}}>{proj.clientName&&`👤 ${proj.clientName}`}{proj.phone&&` · 📞 ${proj.phone}`}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:CLR.muted,marginBottom:4}}>התקדמות</div>
              <div style={{width:80,height:8,background:"#e5e7eb",borderRadius:4,overflow:"hidden"}}>
                <div style={{width:`${progress}%`,height:"100%",background:progress===100?"#16a34a":CLR.primary,borderRadius:4,transition:"width 0.3s"}}/>
              </div>
              <div style={{fontSize:11,color:CLR.muted,marginTop:2}}>{doneCount}/{total} בניינים</div>
            </div>
            <div style={{textAlign:"left"}}>

function buildFreelancerJobText({collab, appt, company}){
  const commLabel = collab.commissionType==="אחוזים"
    ? collab.commissionValue+"%"
    : collab.commissionType==="סכום קבוע"
    ? "₪"+collab.commissionValue
    : collab.commissionValue||"לפי סיכום";

  let yourShare = "";
  if(appt.price && collab.commissionType==="אחוזים" && collab.commissionValue){
    const pct = parseInt(collab.commissionValue)/100;
    yourShare = "\n💵 חלקך: ₪"+Math.round(appt.price*(1-pct))+" (אנחנו לוקחים "+collab.commissionValue+"% = ₪"+Math.round(appt.price*pct)+")";
  } else if(appt.price && collab.commissionType==="סכום קבוע" && collab.commissionValue){
    yourShare = "\n💵 סכום שתקבל: ₪"+(appt.price - parseInt(collab.commissionValue||0));
  }

  const lines = [
    "שלום *"+collab.name+"* 👋",
    "",
    "יש לנו עבודה שנשמח שתטפל בה:",
    "",
    "📋 *פרטי העבודה:*",
  ];
  if(appt.customerName) lines.push("👤 לקוח: "+appt.customerName);
  if(appt.address)      lines.push("📍 כתובת: "+appt.address);
  if(appt.date){
    const [y,m,d]=appt.date.split("-");
    lines.push("📅 תאריך: "+d+"/"+m+"/"+y);
  }
  if(appt.timeWindow)   lines.push("🕐 חלון הגעה: "+appt.timeWindow);
  else if(appt.time)    lines.push("🕐 שעה: "+appt.time);
  if(appt.pestType)     lines.push("🐛 מזיק: "+appt.pestType);
  if(appt.price)        lines.push("💰 מחיר ללקוח: ₪"+appt.price);
  if(yourShare)         lines.push(yourShare);
  lines.push("📊 עמלה שלנו: "+commLabel);
  if(appt.notes)        lines.push("📝 הערות: "+appt.notes);
  lines.push("");
  lines.push("האם אתה פנוי? ענה לנו בבקשה 🙏");
  lines.push(company.name+" 🦟");
  return lines.join("\n");
}

          ourCut=Math.round(doneJobsValue*pct);
        } else if(c.commissionType==="סכום קבוע"&&c.commissionValue){
          ourCut=doneAppts.length*parseInt(c.commissionValue);
          freelancerOwed=doneJobsValue-ourCut;

        const remaining=Math.max(0,freelancerOwed-totalPaid);
        return <div key={c.id} style={{background:CLR.white,border:"1px solid "+CLR.border,borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>

            <span style={{background:statusColor[c.status]||"#f3f4f6",color:statusText[c.status]||"#374151",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600}}>{c.status}</span>
          </div>

// REGIONAL STATS

function RegionalStats({appointments,customers,workers,finance}){
  const [metric,setMetric]=useState("appointments"); // appointments | revenue | customers

  // Extract city from address
  const getCity=addr=>{
    if(!addr) return "לא ידוע";
    const parts=addr.split(",").map(p=>p.trim());
    return parts[parts.length-1]||parts[0]||"לא ידוע";
  };

  // Build city stats
  const cityStats=React.useMemo(()=>{
    const stats={};
    appointments.forEach(a=>{
      const city=getCity(a.address);
      if(!stats[city]) stats[city]={city,appts:0,done:0,revenue:0,customers:new Set()};
      stats[city].appts++;
      if(a.status==="בוצע") stats[city].done++;
      stats[city].revenue+=a.price;
      if(a.customerId) stats[city].customers.add(a.customerId);
    });
    return Object.values(stats).map(s=>({...s,customers:s.customers.size}))
      .sort((a,b)=>b[metric==="revenue"?"revenue":metric==="customers"?"customers":"appts"]-a[metric==="revenue"?"revenue":metric==="customers"?"customers":"appts"]);
  },[appointments,metric]);

  // Worker stats by zone
  const workerStats=workers.filter(w=>w.role==="מדביר").map(w=>({
    ...w,
    appts:appointments.filter(a=>a.workerId===w.id).length,
    done:appointments.filter(a=>a.workerId===w.id&&a.status==="בוצע").length,
    revenue:appointments.filter(a=>a.workerId===w.id&&a.status==="בוצע").reduce((s,a)=>s+a.price,0),
    cities:[...new Set(appointments.filter(a=>a.workerId===w.id).map(a=>getCity(a.address)))].slice(0,5),
  })).sort((a,b)=>b.appts-a.appts);

  const maxVal=Math.max(...cityStats.map(c=>metric==="revenue"?c.revenue:metric==="customers"?c.customers:c.appts),1);

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div>
        <h2 style={{color:CLR.primary,fontSize:17,margin:"0 0 4px"}}>🗺️ ניתוח אזורי</h2>
        <p style={{color:CLR.muted,fontSize:13,margin:0}}>התפלגות עבודה לפי עיר ואזור</p>
      </div>
      <div style={{display:"flex",gap:6}}>
        {[["appointments","תורים"],["revenue","הכנסות"],["customers","לקוחות"]].map(([k,l])=>(
          <button key={k} onClick={()=>setMetric(k)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(metric===k?CLR.primary:CLR.border),background:metric===k?CLR.primary:"transparent",color:metric===k?"#fff":CLR.muted,cursor:"pointer",fontWeight:600,fontSize:13}}>{l}</button>
        ))}
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
      {/* City breakdown */}
      <div style={{background:CLR.white,border:"1px solid "+CLR.border,borderRadius:12,padding:18}}>
        <div style={{fontWeight:600,color:CLR.primary,marginBottom:14,fontSize:14}}>🏙️ לפי עיר</div>
        {cityStats.slice(0,10).map((c,i)=>{
          const val=metric==="revenue"?c.revenue:metric==="customers"?c.customers:c.appts;
          const pct=Math.round(val/maxVal*100);
          return <div key={i} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
              <span style={{fontWeight:500}}>{c.city}</span>
              <span style={{color:CLR.muted,fontSize:12}}>
                {metric==="revenue"?"₪"+c.revenue.toLocaleString():val}
                {metric==="appointments"&&<span style={{color:CLR.muted}}> ({c.done} בוצעו)</span>}
              </span>
            </div>
            <div style={{background:"#f3f4f6",borderRadius:4,height:8}}>
              <div style={{background:CLR.primary,height:"100%",borderRadius:4,width:pct+"%"}}/>
            </div>
          </div>;
        })}
        {cityStats.length===0&&<div style={{color:CLR.muted,fontSize:13}}>אין נתונים</div>}
      </div>

      {/* Worker zone map */}
      <div style={{background:CLR.white,border:"1px solid "+CLR.border,borderRadius:12,padding:18}}>
        <div style={{fontWeight:600,color:CLR.primary,marginBottom:14,fontSize:14}}>👷 מדבירים לפי אזור</div>
        {workerStats.map((w,i)=>(
          <div key={i} style={{marginBottom:14,padding:"10px 12px",background:CLR.surface,borderRadius:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:w.color||CLR.primary,flexShrink:0}}/>
              <span style={{fontWeight:700,fontSize:13}}>{w.name}</span>
              <span style={{fontSize:11,color:CLR.muted,background:"#e5e7eb",borderRadius:10,padding:"1px 8px"}}>{w.zone||"ללא אזור"}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:11,marginBottom:6}}>
              <div style={{textAlign:"center"}}><div style={{color:CLR.muted}}>תורים</div><div style={{fontWeight:700}}>{w.appts}</div></div>
              <div style={{textAlign:"center"}}><div style={{color:CLR.muted}}>בוצעו</div><div style={{fontWeight:700}}>{w.done}</div></div>
              <div style={{textAlign:"center"}}><div style={{color:CLR.muted}}>הכנסות</div><div style={{fontWeight:700,color:CLR.primary}}>₪{w.revenue.toLocaleString()}</div></div>
            </div>
            {w.cities.length>0&&<div style={{fontSize:11,color:CLR.muted}}>🏙️ {w.cities.join(" · ")}</div>}
          </div>
        ))}
        {workerStats.length===0&&<div style={{color:CLR.muted,fontSize:13}}>אין מדבירים</div>}
      </div>
    </div>

    {/* Summary table */}
    <div style={{background:CLR.white,border:"1px solid "+CLR.border,borderRadius:12,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr style={{background:CLR.primary,color:"#fff"}}>
          {["עיר","תורים","בוצעו","הכנסות","לקוחות"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {cityStats.map((c,i)=>(
            <tr key={i} style={{borderBottom:"1px solid "+CLR.border,background:i%2===0?"#f9fafb":"#fff"}}>
              <td style={{padding:"8px 12px",fontWeight:600}}>{c.city}</td>
              <td style={{padding:"8px 12px"}}>{c.appts}</td>
              <td style={{padding:"8px 12px"}}>{c.done} ({c.appts?Math.round(c.done/c.appts*100):0}%)</td>
              <td style={{padding:"8px 12px",fontWeight:600,color:CLR.primary}}>₪{c.revenue.toLocaleString()}</td>
              <td style={{padding:"8px 12px"}}>{c.customers}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </div>;
}

function Dashboard({customers,appointments,finance,workers,execLogs,maintenance=[],scheduledMsgs=[]}){
  // License expiry warnings
  const today=new Date(); today.setHours(0,0,0,0);
  const in30=new Date(today); in30.setDate(in30.getDate()+30);
  const FREQ_DAYS={"פעמיים בשבוע":3,"פעם בשבוע":7,"אחזקה חודשית":31,"כל חודשיים":62,"רבעוני (כל 3 חודשים)":92,"כל 6 חודשים":184,"שנתי":365};
  const overdueMaintenances=maintenance.filter(m=>{
    if(m.status!=="פעיל") return false;
    const freqDays=FREQ_DAYS[m.frequency]||92;
    const thresholdDate=new Date(today); thresholdDate.setDate(thresholdDate.getDate()-freqDays);
    const thresholdISO=thresholdDate.toISOString().split("T")[0];
    const lastVisit=appointments.filter(a=>(a.customerName===m.customerName||a.address===m.address)&&a.status==="בוצע").sort((a,b)=>b.date.localeCompare(a.date))[0];
    const lastDate=lastVisit?.date||m.startDate||"";
    return lastDate<thresholdISO;
  });
  // Tomorrow's appointments for reminders
  const tomorrow=new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowISO=`${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,"0")}-${String(tomorrow.getDate()).padStart(2,"0")}`;
  const tomorrowAppts=appointments.filter(a=>a.date===tomorrowISO&&a.status!=="בוטל").sort((a,b)=>a.time.localeCompare(b.time));

  // Yearly anniversary reminders — customers who had treatment ~1 year ago
  const oneYearAgoDate=new Date(today); oneYearAgoDate.setFullYear(oneYearAgoDate.getFullYear()-1);
  const windowStart=new Date(oneYearAgoDate); windowStart.setDate(windowStart.getDate()-7);
  const windowEnd=new Date(oneYearAgoDate); windowEnd.setDate(windowEnd.getDate()+7);
  const wsISO=windowStart.toISOString().split("T")[0];
  const weISO=windowEnd.toISOString().split("T")[0];
  const anniversaryCustomers=customers.filter(c=>{
    const lastTreat=c.lastTreatment||appointments.filter(a=>a.customerId===c.id&&a.status==="בוצע").sort((a,b)=>b.date.localeCompare(a.date))[0]?.date||"";
    return lastTreat>=wsISO&&lastTreat<=weISO&&c.status!=="לא פעיל";
  }).slice(0,5);

  const licenseWarnings=workers.filter(w=>w.role==="מדביר"&&w.licenseExpiry).map(w=>{
    const exp=new Date(w.licenseExpiry+"T00:00:00");
    const diff=Math.round((exp-today)/(1000*60*60*24));
    if(diff<0) return {name:w.name,msg:"פג תוקף ב-"+fmtDate(w.licenseExpiry),urgent:true};
    if(diff<=30) return {name:w.name,msg:"פג תוקף בעוד "+diff+" ימים ("+fmtDate(w.licenseExpiry)+")",urgent:diff<=7};
    return null;
  }).filter(Boolean);
  const income=finance.filter(f=>f.type==="הכנסה").reduce((s,f)=>s+f.amount,0);
  const expense=finance.filter(f=>f.type==="הוצאה").reduce((s,f)=>s+f.amount,0);
  const pending=appointments.filter(a=>a.status==="ממתין");
  const done=appointments.filter(a=>a.status==="בוצע").length;
  const debts=customers.filter(c=>c.status==="חוב");
  const payNotes=execLogs.filter(l=>!l.paymentDone&&l.paymentNote);
  const noInvoice=appointments.filter(a=>a.status==="בוצע"&&!finance.some(f=>f.apptId===a.id));
  const openDebt=finance.filter(f=>f.status==="חוב").reduce((s,f)=>s+f.amount,0);
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const names=["ינו","פבר","מרץ","אפר","מאי","יוני","יולי","אוג","ספט","אוק","נוב","דצמ"];
    const inc=finance.filter(f=>f.type==="הכנסה"&&(f.date||"").startsWith(key)).reduce((s,f)=>s+f.amount,0);
    months.push({label:names[d.getMonth()],inc});
  }
  const maxVal=Math.max(...months.map(m=>m.inc),1);
  const workerStats=workers.filter(w=>w.role==="מדביר").map(w=>({
    name:w.name, color:w.color||CLR.primary,
    total:appointments.filter(a=>a.workerId===w.id).length,
    done:appointments.filter(a=>a.workerId===w.id&&a.status==="בוצע").length,
  })).sort((a,b)=>b.done-a.done);
  return <div>
    <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
      <StatCard label="לקוחות פעילים" value={customers.filter(c=>c.status==="פעיל").length}/>
      <StatCard label="תורים ממתינים" value={pending.length} sub={done+" הושלמו"}/>
      <StatCard label="הכנסות" value={"₪"+income.toLocaleString()} bg="#dcfce7"/>
      <StatCard label="רווח נקי" value={"₪"+(income-expense).toLocaleString()} bg="#dbeafe"/>
      <StatCard label="חובות" value={"₪"+openDebt.toLocaleString()} bg="#fee2e2"/>
    </div>
    {/* Tomorrow reminders */}
    {tomorrowAppts.length>0&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:12,padding:"14px 18px",marginBottom:16}}>
      <div style={{fontWeight:700,color:"#166534",marginBottom:10,fontSize:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>📅 תורים מחר ({tomorrowAppts.length})</span>
        <span style={{fontSize:12,fontWeight:400,color:"#6b7280"}}>{String(tomorrow.getDate()).padStart(2,"0")}/{String(tomorrow.getMonth()+1).padStart(2,"0")}/{tomorrow.getFullYear()}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {tomorrowAppts.map(a=>{
          const cust=customers.find(c=>c.id===a.customerId)||{};

// EXCEL EXPORT
function exportToCSV(filename,headers,rows){
  const esc=v=>{const s=String(v==null?"":v);if(s.includes(",")||s.includes('"')||s.includes("\n")){return '"'+s.replace(/"/g,'""')+'"';}return s;};
  const lines=[headers.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))];
  const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:filename});
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
