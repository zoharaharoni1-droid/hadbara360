function exportCollabs(collabs, appointments){
  const headers=["שם","טלפון","אזור","רישיון","סטטוס","סוג עמלה","ערך עמלה","תורים משויכים","תורים שבוצעו","שווי עבודות","מגיע לו","שולם","נשאר לשלם","הערות"];
  const rows=collabs.map(c=>{
    const collabAppts=appointments.filter(a=>a.collabId===c.id);
    const doneAppts=collabAppts.filter(a=>a.status==="בוצע");
    const doneVal=doneAppts.reduce((s,a)=>s+a.price,0);
    const totalPaid=(c.payments||[]).reduce((s,p)=>s+p.amount,0);
    let freelancerOwed=0;
    if(c.commissionType==="אחוזים"&&c.commissionValue){
      freelancerOwed=Math.round(doneVal*(1-parseInt(c.commissionValue)/100));
    } else if(c.commissionType==="סכום קבוע"&&c.commissionValue){
      freelancerOwed=doneVal-doneAppts.length*parseInt(c.commissionValue||0);
    }
    const remaining=Math.max(0,freelancerOwed-totalPaid);
    return [c.name,c.phone||"",c.area||"",c.license||"",c.status,c.commissionType,c.commissionValue||"",
      collabAppts.length,doneAppts.length,doneVal,freelancerOwed,totalPaid,remaining,c.notes||""];
  });
  exportToCSV("שיתופי_פעולה_"+todayStr()+".csv", headers, rows);
}

// ─── Auth helpers ─────────────────────────────────
async function sbGetUsers(){
  if(!window._sb) return [];
  const {data,error}=await window._sb.from(SB_USERS_TABLE).select("*").order("created_at");
  return error?[]:data;
}
async function sbAddUser(name,password,role){
  if(!window._sb) return null;
  const hash=await digestPassword(password);
  const {data,error}=await window._sb.from(SB_USERS_TABLE).insert({name,password_hash:hash,role,active:true,created_at:new Date().toISOString()}).select().single();
  return error?null:data;
}
async function sbUpdateUser(id,updates){
  if(!window._sb) return;
  if(updates.password){updates.password_hash=await digestPassword(updates.password);delete updates.password;}
  await window._sb.from(SB_USERS_TABLE).update(updates).eq("id",id);
}
async function sbDeleteUser(id){
  if(!window._sb) return;
  await window._sb.from(SB_USERS_TABLE).delete().eq("id",id);
}
async function sbLogSession(userId,name,role){
  if(!window._sb) return;
  await window._sb.from("crm_sessions").insert({user_id:userId,name,role,ip:"",logged_in_at:new Date().toISOString(),active:true});
}
async function sbLogout(userId){
  if(!window._sb) return;
  await window._sb.from("crm_sessions").update({active:false,logged_out_at:new Date().toISOString()}).eq("user_id",userId).eq("active",true);
}
async function digestPassword(password){
  const enc=new TextEncoder().encode(password);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function sbLogin(name,password){
  if(!window._sb) return null;
  const hash=await digestPassword(password);
  const {data,error}=await window._sb.from(SB_USERS_TABLE).select("*").eq("name",name).eq("password_hash",hash).eq("active",true).single();
  return error?null:data;
}

    const tbl=SB_TABLES[key];if(!tbl||!window._sb)return;
    // Wait a moment for Supabase client to be ready
    const load=()=>window._sb.from(tbl).select("id,data").order("id").then(({data,error})=>{
      if(!error&&data&&data.length>0){
        // Supabase has data — use it
        const items=data.map(r=>({...r.data,_sbId:r.id}));
        setVal(items);
        try{localStorage.setItem(lsKey,JSON.stringify(items));}catch(e){}
      } else if(!error&&data&&data.length===0){
        // Supabase is empty — upload whatever is in localStorage/state
        setVal(prev=>{
          if(Array.isArray(prev)&&prev.length>0){
            // Auto-upload to Supabase
            const rows=prev.map(item=>{const{_sbId,...d}=item;return{data:d};});
            window._sb.from(tbl).insert(rows).select().then(({data:inserted,error:err})=>{
              if(!err&&inserted){
                const synced=inserted.map(r=>({...r.data,_sbId:r.id}));
                setVal(synced);
                try{localStorage.setItem(lsKey,JSON.stringify(synced));}catch(e){}
              }
            });
          }
          return prev;
        });
      }
    });
    // Small delay to let Supabase client initialize
    setTimeout(load, 1000);
  },[key]);
  const set=React.useCallback(v=>{
    setVal(prev=>{
      const next=typeof v==="function"?v(prev):v;
      try{localStorage.setItem(lsKey,JSON.stringify(next));}catch(e){}
      const tbl=SB_TABLES[key];
      if(tbl&&window._sb&&Array.isArray(next)){
        const rows=next.map(item=>{const{_sbId,...d}=item;return _sbId?{id:_sbId,data:d}:{data:d};});
        window._sb.from(tbl).upsert(rows,{onConflict:"id"}).select().then(({data,error})=>{
          if(error){sbShow("❌ שגיאת שמירה","sb-err");}
          else{
            sbShow("💾 נשמר","sb-ok");
            if(data){
              const synced=data.map(r=>({...r.data,_sbId:r.id}));
              setVal(synced);
              try{localStorage.setItem(lsKey,JSON.stringify(synced));}catch(e){}
            }
          }
        });
      }
      return next;
    });
  },[key]);
  return [val,set];
}

async function uploadToSupabase(){
  if(!window._sb){
    alert("❌ אין חיבור ל-Supabase. רענן את הדף ונסה שוב.");
    return;
  }
  const DATA_KEYS=["customers","workers","appointments","finance","notes","maintenance","projects","collabs","execLogs","scheduledMsgs","msgTemplates"];
  const TABLE_NAMES={"customers":"customers","workers":"workers","appointments":"appointments","finance":"finance","notes":"notes","execLogs":"exec_logs","maintenance":"maintenance","projects":"projects","collabs":"collabs","scheduledMsgs":"scheduled_msgs","msgTemplates":"msg_templates"};
  
  if(!window.confirm("העלה את כל הנתונים המקומיים ל-Supabase?\n\nפעולה זו תסנכרן את כל הנתונים שיש בדפדפן זה לענן — שאר המשתמשים יראו אותם.")) return;
  
  const sbShow2=(msg,cls)=>{
    const el=document.getElementById("sb-status");
    if(el){el.textContent=msg;el.className="show "+cls;clearTimeout(el._t);el._t=setTimeout(()=>el.className="",6000);}
  };
  
  sbShow2("☁️ מעלה נתונים...","sb-info");
  let totalUploaded=0;
  let errors=[];
  
  for(const key of DATA_KEYS){
    const tbl=TABLE_NAMES[key];
    if(!tbl) continue;
    try{
      const raw=localStorage.getItem("h360_"+key);
      if(!raw) continue;
      const items=JSON.parse(raw);
      if(!Array.isArray(items)||items.length===0) continue;
      
      // Delete existing rows first to avoid conflicts
      await window._sb.from(tbl).delete().neq("id",0);
      
      // Insert all items
      const rows=items.map(item=>{
        const {_sbId,...d}=item;
        return {data:d};
      });
      
      const {data,error}=await window._sb.from(tbl).insert(rows).select();
      if(error){
        errors.push(key+": "+error.message);
      } else {
        totalUploaded+=rows.length;
        // Update localStorage with _sbId
        const synced=data.map(r=>({...r.data,_sbId:r.id}));
        localStorage.setItem("h360_"+key, JSON.stringify(synced));
      }
    } catch(e){
      errors.push(key+": "+e.message);
    }
  }
  
  if(errors.length>0){
    sbShow2("⚠️ "+totalUploaded+" פריטים הועלו, שגיאות: "+errors.join(", "),"sb-err");
    alert("הועלו "+totalUploaded+" פריטים.\n\nשגיאות:\n"+errors.join("\n"));
  } else {
    sbShow2("✅ "+totalUploaded+" פריטים הועלו בהצלחה!","sb-ok");
    alert("✅ "+totalUploaded+" פריטים הועלו ל-Supabase בהצלחה!\n\nכעת כל משתמש שיפתח את הקובץ יראה את הנתונים.");
    window.location.reload();
  }
}

function exportBackup(){
  const DATA_KEYS=["customers","workers","appointments","finance","notes","maintenance","projects","collabs","execLogs"];
  const backup={version:1, exportedAt:new Date().toISOString(), data:{}};
  DATA_KEYS.forEach(k=>{
    try{ const v=localStorage.getItem("h360_"+k); backup.data[k]=v?JSON.parse(v):[]; }
    catch(e){ backup.data[k]=[]; }
  });
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  const a=Object.assign(document.createElement("a"),{
    href:URL.createObjectURL(blob),
    download:"hadbara360_backup_"+new Date().toISOString().slice(0,10)+".json"
  });
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function importBackup(){
  const input=document.createElement("input");
  input.type="file"; input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const backup=JSON.parse(ev.target.result);
        if(!backup.data) throw new Error("קובץ גיבוי לא תקין");
        const count=Object.keys(backup.data).length;
        if(!window.confirm("⚠️ שחזור גיבוי מ-"+new Date(backup.exportedAt).toLocaleDateString("he-IL")+"\n\nפעולה זו תחליף את כל הנתונים הקיימים!\n\nלהמשיך?")) return;
        Object.entries(backup.data).forEach(([k,v])=>{
          localStorage.setItem("h360_"+k, JSON.stringify(v));
        });
        alert("✅ הגיבוי שוחזר בהצלחה! הדף יטען מחדש.");
        window.location.reload();
      } catch(err){
        alert("❌ שגיאה בטעינת הגיבוי: "+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAllData(){
  if(!window.confirm('⚠️ למחוק את כל הנתונים ולחזור להגדרות ברירת מחדל?\n\nפעולה זו אינה ניתנת לביטול!')) return;
  ['customers','workers','appointments','finance','notes','maintenance','projects','execLogs','calcPageState']
    .forEach(k => localStorage.removeItem('h360_' + k));
  window.location.reload();
}

function DayView({date, appointments, workers, finance, execLogs, currentUser, onApptClick, onNewAppt}){
  const toISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const iso = toISO(date);
  const HALF_SLOTS = ["07:00","07:30","08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30",
    "12:00","12:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00"];
  const slotHour = t => parseInt((t||"0").split(":")[0]);
  const slotMin  = t => parseInt(((t||"0").split(":")[1])||"0");
  const dayNames = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const fmtDay = d => `יום ${dayNames[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  const wColor = wid => { const w=workers.find(x=>x.id===wid); return w?.color||"#1a5c3a"; };

  const dayAppts = (appointments||[]).filter(a => a.date===iso)
    .sort((a,b)=>a.time.localeCompare(b.time));

  return <div style={{direction:"rtl"}}>
    <div style={{fontWeight:700,fontSize:15,color:"#1a5c3a",marginBottom:12,padding:"8px 0 10px",borderBottom:"2px solid #e8f5ee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:400,color:"#6b7280"}}>{dayAppts.length} תורים</span>

    </div>}
    <div style={{border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden"}}>
      {HALF_SLOTS.map(slot=>{
        const atSlot = dayAppts.filter(a=>slotHour(a.time)===slotHour(slot)&&slotMin(a.time)===slotMin(slot));

// MONTH VIEW
// ═══════════════════════════════════════════════════════
function MonthView({year, month, appointments, workers, finance, execLogs, currentUser, onDayClick}){
  const toISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const todayISO = toISO(new Date());
  const wColor = wid => { const w=workers.find(x=>x.id===wid); return w?.color||"#1a5c3a"; };

  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  // Week starts Sunday (0). We want Sunday first.
  const startPad = firstDay.getDay(); // 0=Sun … 6=Sat
  const totalCells = Math.ceil((startPad + lastDay.getDate()) / 7) * 7;

  const days = [];
  for(let i=0; i<totalCells; i++){
    const dayNum = i - startPad + 1;
    if(dayNum < 1 || dayNum > lastDay.getDate()){ days.push(null); continue; }
    const d = new Date(year, month, dayNum);
    const iso = toISO(d);
    const appts = (appointments||[]).filter(a=>a.date===iso);
    days.push({dayNum, iso, appts, isToday: iso===todayISO});
  }

  const dayLabels = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
  const monthNames = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  return <div style={{direction:"rtl"}}>
    <div style={{fontWeight:700,fontSize:15,color:"#1a5c3a",marginBottom:12,textAlign:"center"}}>{monthNames[month]} {year}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#e5e7eb",border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden"}}>
      {dayLabels.map(l=><div key={l} style={{background:"#1a5c3a",color:"#fff",textAlign:"center",padding:"7px 0",fontSize:12,fontWeight:600}}>{l}</div>)}
      {days.map((day,i)=>(
        <div key={i} onClick={()=>day&&onDayClick(new Date(year,month,day.dayNum))}
          style={{background:day?.isToday?"#e8f5ee":"#fff",minHeight:80,padding:"5px",cursor:day?"pointer":"default",
            outline:day?.isToday?"2px solid #1a5c3a":"none",outlineOffset:"-2px",position:"relative"}}
          onMouseEnter={e=>day&&(e.currentTarget.style.background=day.isToday?"#d1fae5":"#f9fafb")}
          onMouseLeave={e=>day&&(e.currentTarget.style.background=day?.isToday?"#e8f5ee":"#fff")}>
          {day && <>
            <div style={{fontSize:12,fontWeight:day.isToday?700:500,color:day.isToday?"#1a5c3a":"#374151",marginBottom:3}}>{day.dayNum}</div>
            {day.appts.slice(0,3).map(a=>{
              const prog=jobProgress(a,execLogs,finance);
              return <div key={a.id} style={{fontSize:10,padding:"2px 5px",borderRadius:4,marginBottom:2,
                background:wColor(a.workerId)+"22",borderRight:`3px solid ${wColor(a.workerId)}`,
                overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",color:"#111"}}>
                {a.time} {a.customerName}
              </div>;
            })}
            {day.appts.length>3&&<div style={{fontSize:10,color:"#6b7280",padding:"1px 4px"}}>+{day.appts.length-3} נוספים</div>}
          </>}
        </div>
      ))}
    </div>
  </div>;
}

      let tries=0;
      while(!window._sb&&tries<20){await new Promise(r=>setTimeout(r,300));tries++;}
      if(!window._sb){setChecking(false);return;}
      const users=await sbGetUsers();

        const admin=await sbAddUser("מנהל ראשי","admin123","מנהל");

          await sbAddUser("נטלי שפירא","natali123","פקידה");
          await sbAddUser("אמיר חסן","amir123","מדביר");
          await sbAddUser("מוטי גרין","moti123","מדביר");
          sessionStorage.setItem("crm_user",JSON.stringify(admin));
          onLogin(admin);
          return;
        }
      }
      setChecking(false);
    };
    check();
  },[]);

  const handleLogin=async()=>{

    setLoading(true);setError("");
    let tries=0;
    while(!window._sb&&tries<10){await new Promise(r=>setTimeout(r,300));tries++;}
    const user=await sbLogin(name,password);
    if(user){
      await sbLogSession(user.id,user.name,user.role);
      sessionStorage.setItem("crm_user",JSON.stringify(user));
      onLogin(user);
    } else {
      setError("שם משתמש או סיסמה שגויים");
      setLoading(false);
    }
  };

  if(checking) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f1a14",direction:"rtl"}}>
    <div style={{textAlign:"center",color:"#3ddc84"}}>
      <div style={{fontSize:48,marginBottom:16}}>🦟</div>
      <div style={{fontSize:16,fontWeight:600}}>טוען מערכת הדברה 360...</div>
    </div>
  </div>;

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f1a14 0%,#1a3326 100%)",direction:"rtl",padding:16}}>
    <div style={{background:"#fff",borderRadius:20,padding:"40px 36px",width:380,maxWidth:"100%",boxShadow:"0 25px 80px rgba(0,0,0,0.4)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:52,marginBottom:8}}>🦟</div>
        <div style={{fontSize:22,fontWeight:800,color:"#1a5c3a",marginBottom:4}}>הדברה 360</div>
        <div style={{fontSize:14,color:"#6b7280"}}>מערכת ניהול מקצועית</div>
      </div>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:13,color:"#374151",display:"block",marginBottom:6,fontWeight:600}}>שם משתמש</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="הזן שם משתמש"
          onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"2px solid #e5e7eb",fontSize:15,boxSizing:"border-box",outline:"none",transition:"border 0.2s"}}
          onFocus={e=>e.target.style.border="2px solid #1a5c3a"}
          onBlur={e=>e.target.style.border="2px solid #e5e7eb"}/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{fontSize:13,color:"#374151",display:"block",marginBottom:6,fontWeight:600}}>סיסמה</label>
        <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="הזן סיסמה"
          onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"2px solid #e5e7eb",fontSize:15,boxSizing:"border-box",outline:"none"}}
          onFocus={e=>e.target.style.border="2px solid #1a5c3a"}
          onBlur={e=>e.target.style.border="2px solid #e5e7eb"}/>
      </div>
      {error&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#dc2626",textAlign:"center"}}>⚠️ {error}</div>}
      <button onClick={handleLogin} disabled={loading}
        style={{width:"100%",padding:"13px",borderRadius:10,background:"#1a5c3a",color:"#fff",border:"none",fontSize:16,fontWeight:700,cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1}}>
        {loading?"🔄 מתחבר...":"🔐 כניסה למערכת"}
      </button>
      <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"#9ca3af"}}>
        פנה למנהל לקבלת פרטי כניסה
      </div>
    </div>
  </div>;
}

// USER MANAGEMENT (admin only)
// ════════════════════════════════════════════════════
function UserManagement({currentUser,onClose}){
  const [users,setUsers]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [newUser,setNewUser]=useState({name:"",password:"",role:"מדביר"});
  const [loading,setLoading]=useState(true);
  const [editUser,setEditUser]=useState(null);
  const [newPass,setNewPass]=useState("");

  const load=async()=>{
    setLoading(true);
    const u=await sbGetUsers();
    setUsers(u);
    if(window._sb){
      const {data}=await window._sb.from("crm_sessions").select("*").order("logged_in_at",{ascending:false}).limit(50);
      setSessions(data||[]);
    }
    setLoading(false);
  };

  React.useEffect(()=>{load();},[]);

  const addUser=async()=>{
    if(!newUser.name||!newUser.password){alert("שם וסיסמה חובה");return;}
    await sbAddUser(newUser.name,newUser.password,newUser.role);
    setNewUser({name:"",password:"",role:"מדביר"});
    setShowAdd(false);
    load();
  };

  const toggleActive=async(u)=>{
    await sbUpdateUser(u.id,{active:!u.active});
    load();
  };

  const deleteUser=async(u)=>{
    if(!window.confirm("למחוק את "+u.name+"?")) return;
    await sbDeleteUser(u.id);
    load();
  };

  const changePassword=async(u)=>{
    if(!newPass){alert("הזן סיסמה חדשה");return;}
    await sbUpdateUser(u.id,{password:newPass});
    setEditUser(null);setNewPass("");
    alert("✅ סיסמה עודכנה");
  };

  const roleColor={מנהל:"#dbeafe",פקידה:"#fef9c3",מדביר:"#dcfce7"};
  const roleText={מנהל:"#1e40af",פקידה:"#854d0e",מדביר:"#166534"};

  // Active sessions (last 24h)
  const now=new Date();
  const activeSessions=sessions.filter(s=>s.active&&new Date(s.logged_in_at)>new Date(now-24*60*60*1000));

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:640,maxWidth:"98vw",maxHeight:"90vh",overflow:"auto",direction:"rtl"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,color:"#1a5c3a",fontSize:18}}>👥 ניהול משתמשים</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#6b7280"}}>✕</button>
      </div>

      {/* Active sessions */}
      {activeSessions.length>0&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
        <div style={{fontWeight:700,color:"#166534",marginBottom:8,fontSize:13}}>🟢 מחוברים עכשיו / 24 שעות אחרונות ({activeSessions.length})</div>
        {activeSessions.map((s,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #bbf7d0"}}>
            <span><b>{s.name}</b> · {s.role}</span>
            <span style={{color:"#6b7280"}}>{new Date(s.logged_in_at).toLocaleString("he-IL")}</span>
          </div>
        ))}
      </div>}

      {/* Users list */}
      {loading?<div style={{textAlign:"center",padding:30,color:"#6b7280"}}>טוען...</div>:
      <div style={{marginBottom:16}}>
        {users.map(u=>(
          <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:u.active?"#f9fafb":"#fef2f2",borderRadius:10,marginBottom:8,border:"1px solid #e5e7eb"}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:roleColor[u.role]||"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:roleText[u.role]||"#374151",fontSize:14,flexShrink:0}}>
              {u.name.charAt(0)}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
              <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center"}}>
                <span style={{background:roleColor[u.role]||"#f3f4f6",color:roleText[u.role]||"#374151",padding:"1px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{u.role}</span>
                {!u.active&&<span style={{background:"#fee2e2",color:"#dc2626",padding:"1px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>מנותק</span>}
                {u.last_login&&<span style={{fontSize:11,color:"#9ca3af"}}>כניסה אחרונה: {new Date(u.last_login).toLocaleString("he-IL")}</span>}
              </div>
            </div>
            {u.id!==currentUser.id&&<div style={{display:"flex",gap:6}}>
              {editUser?.id===u.id
                ? <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="סיסמה חדשה" type="password"
                      style={{padding:"5px 8px",borderRadius:6,border:"1px solid #d1d5db",fontSize:12,width:120}}/>
                    <button onClick={()=>changePassword(u)} style={{padding:"5px 10px",borderRadius:6,background:"#1a5c3a",color:"#fff",border:"none",fontSize:12,cursor:"pointer"}}>✓</button>
                    <button onClick={()=>{setEditUser(null);setNewPass("");}} style={{padding:"5px 10px",borderRadius:6,background:"#f3f4f6",color:"#6b7280",border:"none",fontSize:12,cursor:"pointer"}}>✕</button>
                  </div>
                : <>
                    <button onClick={()=>{setEditUser(u);setNewPass("");}} style={{padding:"5px 10px",borderRadius:6,background:"#f3f4f6",color:"#374151",border:"1px solid #e5e7eb",fontSize:12,cursor:"pointer"}}>🔑 סיסמה</button>
                    <button onClick={()=>toggleActive(u)} style={{padding:"5px 10px",borderRadius:6,background:u.active?"#fef9c3":"#dcfce7",color:u.active?"#854d0e":"#166534",border:"none",fontSize:12,cursor:"pointer",fontWeight:600}}>
                      {u.active?"⛔ נתק":"✅ הפעל"}
                    </button>
                    <button onClick={()=>deleteUser(u)} style={{padding:"5px 8px",borderRadius:6,background:"#fee2e2",color:"#dc2626",border:"none",fontSize:12,cursor:"pointer"}}>🗑</button>
                  </>}
            </div>}
            {u.id===currentUser.id&&<span style={{fontSize:11,color:"#9ca3af",padding:"4px 8px"}}>👤 אתה</span>}
          </div>
        ))}
      </div>}

      {/* Add user */}
      {showAdd
        ? <div style={{background:"#f0fdf4",border:"2px solid #1a5c3a",borderRadius:12,padding:"16px 18px",marginBottom:16}}>
            <div style={{fontWeight:700,color:"#1a5c3a",marginBottom:12,fontSize:14}}>+ משתמש חדש</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
              <input value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="שם המשתמש"
                style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,boxSizing:"border-box"}}/>
              <input type="password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="סיסמה"
                style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,boxSizing:"border-box"}}/>
              <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))}
                style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,boxSizing:"border-box"}}>
                <option value="מנהל">מנהל</option>
                <option value="פקידה">פקידה</option>
                <option value="מדביר">מדביר</option>
              </select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addUser} style={{flex:1,padding:"9px",borderRadius:8,background:"#1a5c3a",color:"#fff",border:"none",fontSize:14,fontWeight:700,cursor:"pointer"}}>✅ הוסף משתמש</button>
              <button onClick={()=>setShowAdd(false)} style={{padding:"9px 16px",borderRadius:8,background:"#f3f4f6",color:"#6b7280",border:"none",fontSize:14,cursor:"pointer"}}>ביטול</button>
            </div>
          </div>
        : <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:"11px",borderRadius:10,background:"#f0fdf4",color:"#1a5c3a",border:"2px dashed #1a5c3a",fontSize:14,fontWeight:600,cursor:"pointer"}}>
            + הוסף משתמש חדש
          </button>}
    </div>
  </div>;
}

function App(){
  // Auth state — check sessionStorage first
  const [authUser,setAuthUser]=useState(()=>{
    try{const u=sessionStorage.getItem("crm_user");return u?JSON.parse(u):null;}catch(e){return null;}
  });
  const [showUserMgmt,setShowUserMgmt]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [showSearch,setShowSearch]=useState(false);

  // Map DB user to app user format
  const user=authUser?{id:authUser.id,name:authUser.name,role:authUser.role}:null;
  const handleLogout=async()=>{
    if(!window.confirm("להתנתק מהמערכת?")) return;
    if(authUser) await sbLogout(authUser.id);
    sessionStorage.removeItem("crm_user");
    setAuthUser(null);
  };

  const [customers,setCustomers]=useLS("customers", initCustomers);
  const [workers,setWorkers]=useLS("workers", initWorkers);
  const [appointments,setAppointments]=useLS("appointments", initAppointments);
  const [finance,setFinance]=useLS("finance", initFinance);
  const [notes,setNotes]=useLS("notes", initNotes);
  const [maintenance,setMaintenance]=useLS("maintenance",[]);
  const [projects,setProjects]=useLS("projects",[]);
  const [collabs,setCollabs]=useLS("collabs",[]);
  const [scheduledMsgs,setScheduledMsgs]=useLS("scheduledMsgs",[]);
  const [msgTemplates,setMsgTemplates]=useLS("msgTemplates",[
    {id:1,name:"תזכורת לתור",emoji:"📅",text:"שלום *{שם}* 👋\n\nתזכורת: מחר {תאריך} יגיע המדביר *{מדביר}* לטיפול ב*{מזיק}*.\n📍 {כתובת}\n🕐 {שעה}\n\nלשאלות — "+COMPANY.name+" 🦟"},
    {id:2,name:"אישור הזמנה",emoji:"✅",text:"שלום *{שם}* 👋\n\nקיבלנו את הזמנתך!\n📅 {תאריך} · 🕐 {שעה}\n📍 {כתובת}\n🐛 טיפול: {מזיק}\n\nלשאלות — "+COMPANY.name+" 🦟"},
    {id:3,name:"תודה לאחר טיפול",emoji:"🙏",text:"שלום *{שם}* 👋\n\nתודה שבחרת ב-"+COMPANY.name+"!\nהטיפול בוצע בהצלחה.\n\nנשמח לעמוד לשירותך שוב 😊"},
    {id:4,name:"תזכורת תשלום",emoji:"💳",text:"שלום *{שם}* 👋\n\nבהתאם לבדיקתנו, ישנו חוב פתוח עבור הטיפול שביצענו.\nנשמח להסדיר את התשלום בהקדם.\n\n"+COMPANY.name+" 🦟"},
  ]);
  const [execLogs,setExecLogs]=useLS("execLogs",initExecLogs);

  if(!authUser) return <LoginScreen onLogin={u=>{setAuthUser(u);}}/>;

  const TABS=[
    {id:"dashboard",label:"📊 דשבורד"},
    {id:"neworder",label:"📝 הזמנת עבודה",hideFor:"מדביר"},
    {id:"calculator",label:"🧮 מחשבון תמחור",hideFor:"מדביר"},
    {id:"customers",label:"👤 לקוחות"},
    {id:"calendar",label:"📅 יומן תורים"},
    {id:"execlog",label:"📋 יומן ביצוע"},
    {id:"invoices",label:"🧾 חשבוניות",hideFor:"מדביר"},
    {id:"maintenance",label:"🔁 אחזקות",hideFor:"מדביר"},
    {id:"projects",label:"🏗️ פרויקטים",hideFor:"מדביר"},
    {id:"notes",label:"📓 הערות"},
    {id:"templates",label:"💬 תבניות הודעה",hideFor:"מדביר"},
    {id:"scheduler",label:"⏰ הודעות מתוזמנות",hideFor:"מדביר"},
    {id:"regional",label:"🗺️ ניתוח אזורי",hideFor:"מדביר"},
    {id:"finance",label:"💰 כספים"},
    {id:"collabs",label:"🤝 שיתופי פעולה",hideFor:"מדביר"},
    {id:"workers",label:"👥 עובדים",adminOnly:true},
  ].filter(t=>(!t.adminOnly||user.role!=="מדביר")&&(t.hideFor!==user.role));

  // exec log tab has its own dark bg – no padding wrapper
  const isFullTab=tab==="execlog";

  // Ctrl+K global search shortcut
  React.useEffect(()=>{
    const h=e=>{ if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setShowSearch(s=>!s);} };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);

  return(
    <div style={{direction:"rtl",fontFamily:"system-ui,sans-serif",minHeight:"100vh",background:isFullTab?CLR.dk_bg:"#f0f4f2"}}>
      {showSearch&&<GlobalSearch customers={customers} appointments={appointments} finance={finance} execLogs={execLogs} notes={notes} onNavigate={t=>setTab(t)} onClose={()=>setShowSearch(false)}/>}
      {/* Header */}
      <div style={{background:CLR.primary,color:"#fff",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0"}}>
          <span style={{fontSize:22}}>🦟</span>
          <div><div style={{fontWeight:700,fontSize:16}}>{COMPANY.name}</div><div style={{fontSize:11,opacity:0.75}}>מערכת ניהול מקצועית</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
          <span style={{fontSize:11,opacity:0.8}}>משתמש:</span>
          <div style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"4px 14px",fontSize:13,fontWeight:600}}>
            👤 {user.name} <span style={{opacity:0.7,fontWeight:400}}>({user.role})</span>
          </div>
          {user.role==="מנהל"&&<button onClick={()=>setShowUserMgmt(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>⚙️ משתמשים</button>}
          <button onClick={handleLogout} style={{background:"rgba(239,68,68,0.3)",color:"#fca5a5",border:"1px solid rgba(252,165,165,0.4)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>🚪 התנתק</button>
          <button onClick={()=>setShowSearch(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.35)",borderRadius:8,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:600}}>🔍 חיפוש</button>
          <span style={{background:"rgba(34,197,94,0.2)",color:"#86efac",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600}}>💾 נשמר</span>
          <button onClick={exportBackup} title="ייצא גיבוי של כל הנתונים" style={{background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.75)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:6,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>📦 גיבוי</button>
          <button onClick={uploadToSupabase} title="העלה את כל הנתונים המקומיים ל-Supabase" style={{background:"rgba(59,130,246,0.3)",color:"#93c5fd",border:"1px solid rgba(147,197,253,0.4)",borderRadius:6,padding:"3px 9px",fontSize:11,cursor:"pointer",fontWeight:600}}>☁️ העלה ל-Supabase</button>
          <button onClick={importBackup} title="שחזר מגיבוי" style={{background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.75)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:6,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>📂 שחזר</button>
          <button onClick={resetAllData} style={{background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.55)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>↺ איפוס</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:isFullTab?CLR.dk_card:CLR.white,borderBottom:`1px solid ${isFullTab?CLR.dk_border:CLR.border}`,display:"flex",paddingRight:12,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"12px 16px",border:"none",background:"none",cursor:"pointer",fontSize:13,
              fontWeight:tab===t.id?700:400,
              color:tab===t.id?(isFullTab?CLR.dk_primary:CLR.primary):(isFullTab?CLR.dk_muted:CLR.muted),
              borderBottom:tab===t.id?`3px solid ${isFullTab?CLR.dk_primary:CLR.primary}`:"3px solid transparent",
              whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      {isFullTab
        ? <ExecLogTab currentUser={user} workers={workers} appointments={appointments} setAppointments={setAppointments} execLogs={execLogs} setExecLogs={setExecLogs} finance={finance} setFinance={setFinance}/>
        : <div style={{padding:"20px",maxWidth:1180,margin:"0 auto"}}>
            {tab==="dashboard"&&<Dashboard customers={customers} appointments={appointments} finance={finance} workers={workers} execLogs={execLogs} maintenance={maintenance} scheduledMsgs={scheduledMsgs}/>}
            {tab==="neworder"&&<NewOrderPage customers={customers} setCustomers={setCustomers} appointments={appointments} setAppointments={setAppointments} workers={workers} goToCustomers={()=>setTab("customers")}/>}
            {tab==="calculator"&&<CalculatorPage/>}
            {tab==="customers"&&<Customers customers={customers} setCustomers={setCustomers} appointments={appointments} setAppointments={setAppointments} workers={workers} collabs={collabs} finance={finance} setFinance={setFinance} execLogs={execLogs} currentUser={user}/>}
            {tab==="calendar"&&<WeekCalendar appointments={appointments} setAppointments={setAppointments} customers={customers} setCustomers={setCustomers} workers={workers} collabs={collabs} finance={finance} setFinance={setFinance} execLogs={execLogs} setExecLogs={setExecLogs} currentUser={user}/>}
            {tab==="invoices"&&<Invoices finance={finance} setFinance={setFinance} customers={customers} appointments={appointments}/>}
            {tab==="maintenance"&&<Maintenance maintenance={maintenance} setMaintenance={setMaintenance} customers={customers}/>}
            {tab==="projects"&&<Projects projects={projects} setProjects={setProjects} workers={workers} appointments={appointments} setAppointments={setAppointments} customers={customers} setCustomers={setCustomers}/>}
            {tab==="notes"&&<Notes notes={notes} setNotes={setNotes} currentUser={user} workers={workers}/>}
            {tab==="templates"&&<MsgTemplates templates={msgTemplates} setTemplates={setMsgTemplates} customers={customers} appointments={appointments}/>}
            {tab==="scheduler"&&<ScheduledMsgs scheduled={scheduledMsgs} setScheduled={setScheduledMsgs} customers={customers} appointments={appointments} templates={msgTemplates}/>}
            {tab==="regional"&&<RegionalStats appointments={appointments} customers={customers} workers={workers} finance={finance}/>}
            {tab==="finance"&&<Finance finance={finance} setFinance={setFinance} customers={customers}/>}
            {tab==="collabs"&&<Collabs collabs={collabs} setCollabs={setCollabs} appointments={appointments}/>}
            {tab==="workers"&&<Workers workers={workers} setWorkers={setWorkers} appointments={appointments}/>}
          </div>
      }
      {showUserMgmt&&<UserManagement currentUser={authUser} onClose={()=>setShowUserMgmt(false)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

<script>
(function(){
  function _show(msg,cls,perm){
    var el=document.getElementById("sb-status");
    if(!el)return;
    el.textContent=msg;el.className="show "+cls;
    clearTimeout(el._t);
    if(!perm)el._t=setTimeout(function(){el.className="";},cls==="sb-err"?5000:2000);
  }
  function init(){
    if(!window.supabase||!window.supabase.createClient){setTimeout(init,200);return;}
    var sb=window.supabase.createClient("https://ilublhgawgfznxpdrfra.supabase.co","sb_publishable_2wEa3ZI2D-fCqNIFEwVGAg_87sfM616");
    window._sb=sb;
    _show("🔄 מתחבר...","sb-info",true);
    sb.from("customers").select("id").limit(1).then(function(r){
      if(r.error){
        _show(r.error.code==="42P01"?"⚠️ הרץ SQL תחילה":"❌ "+r.error.message,"sb-err",true);
        console.error("SB:",r.error);
      }else{
        _show("✅ מחובר ל-Supabase","sb-ok",false);
        console.log("✅ Supabase connected");
      }
    }).catch(function(e){_show("❌ אין חיבור","sb-err",true);console.error(e);});
  }
  setTimeout(init,500);
})();
