// Build a client-facing note of which common areas are treated, given exclusions
function BUILDING_AREAS_NOTE(exclusions){
  const all=["חדר מדרגות","מקלט","חצר","ביובים"];
  const map={"מדרגות":"חדר מדרגות","מקלט":"מקלט","חצר":"חצר","ביובים":"ביובים"};
  const excluded=(exclusions||[]).map(e=>map[e]||e);
  const included=all.filter(a=>!excluded.includes(a));
  return included.join(", ")||"לפי סיכום";
}

// Build a client-facing quote (no discounts/combos shown — only what the customer needs).
// quote = {properties:[{label,price,services,areas,guidance:[{pest,prep,during,returnTime,washing,warranty}]}], total}
function buildClientQuoteText({company,customerName,date,timeWindow,address,quote,price}){
  const L=[];
  L.push(`*הצעת מחיר – ${company.name}*`);
  if(customerName) L.push(`לכבוד: ${customerName}`);
  if(address) L.push(`כתובת: ${address}`);
  if(date) L.push(`מועד מתואם: ${fmtDate(date)}${timeWindow?` בין ${timeWindow}`:""}`);
  L.push("");
  L.push("*פירוט השירות והמחיר:*");
  if(quote&&quote.properties&&quote.properties.length){
    quote.properties.forEach(p=>{
      L.push(`• ${p.label} — ${p.services.join(", ")}: *₪${p.price}*`);
    });
    L.push("");
    L.push(`*סה"כ לתשלום (כולל מע"מ): ₪${quote.total}*`);
  } else {
    L.push(`• הדברה: *₪${price}*`);
  }
  // Guidance per pest (client-relevant only)
  const seen=new Set();
  const guides=[];
  (quote?.properties||[]).forEach(p=>{
    if(p.areas) guides.push({title:`אזורי טיפול ב${p.type||"נכס"}`,lines:[p.areas]});
    (p.guidance||[]).forEach(g=>{
      if(seen.has(g.pest)) return; seen.add(g.pest);
      const lines=[];
      if(g.prep) lines.push(`לפני: ${g.prep}`);
      if(g.during) lines.push(`בזמן: ${g.during}`);
      if(g.returnTime) lines.push(`חזרה: ${g.returnTime}`);
      if(g.washing) lines.push(`שטיפה: ${g.washing}`);
      guides.push({title:g.pest,lines});
    });
  });
  if(guides.length){
    L.push("");
    L.push("*הנחיות הכנה והתנהלות:*");
    guides.forEach(gr=>{ L.push(`*${gr.title}:*`); gr.lines.forEach(l=>L.push(`  - ${l}`)); });
  }
  L.push("");
  L.push("ההצעה תקפה ל-14 יום. נשמח לעמוד לשירותכם!");
  return L.join("\n");
}

// Compute the overall progress of a job from its flags.
// Returns {stage, label, color, steps:[{name,done}]}
function jobProgress(appt, execLogs, finance){
  const log = execLogs?.find(l=>l.apptId===appt.id) || appt.executionLog || null;
  const workDone = !!log || appt.status==="בוצע";
  const invoice = finance?.find(f=>f.apptId===appt.id) || null;
  const invoiced = !!invoice;
  const paid = (log?.paymentDone===true) || (invoice && invoice.status==="שולם");
  const cancelled = appt.status==="בוטל";

  const steps=[
    {name:"שובץ",done:true},
    {name:"בוצעה הדברה",done:workDone},
    {name:"הופקה חשבונית",done:invoiced},
    {name:"התקבל תשלום",done:paid},
  ];

  if(cancelled) return {stage:"בוטל",label:"בוטל",color:"#9ca3af",steps};
  if(workDone&&invoiced&&paid) return {stage:"הושלם",label:"✓ הושלם",color:"#16a34a",steps};
  if(workDone&&invoiced) return {stage:"ממתין לתשלום",label:"ממתין לתשלום",color:"#d97706",steps};
  if(workDone&&paid) return {stage:"בוצע, חסרה חשבונית",label:"בוצע · חסר חשבונית",color:"#d97706",steps};
  if(workDone) return {stage:"בוצעה הדברה",label:"בוצעה הדברה",color:"#2563eb",steps};
  if(appt.status==="בדרך") return {stage:"בדרך",label:"בדרך ללקוח",color:"#2563eb",steps};
  return {stage:"ממתין",label:"ממתין לביצוע",color:"#854d0e",steps};
}

// Small horizontal progress tracker
function ProgressTrack({steps,compact=false}){
  return <div style={{display:"flex",alignItems:"center",gap:compact?3:6,flexWrap:"wrap"}}>
    {steps.map((s,i)=>(
      <div key={i} style={{display:"flex",alignItems:"center",gap:compact?3:6}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:compact?10:12,
          color:s.done?"#16a34a":"#9ca3af",fontWeight:s.done?600:400}}>
          <span style={{width:compact?14:18,height:compact?14:18,borderRadius:"50%",
            background:s.done?"#16a34a":"#e5e7eb",color:"#fff",display:"inline-flex",
            alignItems:"center",justifyContent:"center",fontSize:compact?9:11,flexShrink:0}}>
            {s.done?"✓":i+1}
          </span>
          {!compact&&s.name}
        </span>
        {i<steps.length-1&&<span style={{color:s.done?"#16a34a":"#d1d5db",fontSize:compact?10:12}}>—</span>}
      </div>
    ))}
  </div>;
}

function ChemPicker({selected,onChange}){
  const [srch,setSrch]=useState("");
  const filtered=CHEMICALS.filter(c=>!srch||c.name.includes(srch)||c.targets.some(t=>t.includes(srch)));
  const toggle=n=>{const ex=selected.find(s=>s.name===n);ex?onChange(selected.filter(s=>s.name!==n)):onChange([...selected,{name:n,batch:""}]);};
  const setBatch=(n,b)=>onChange(selected.map(s=>s.name===n?{...s,batch:b}:s));
  return <div>
    <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="🔍 חפש חומר או מזיק..."

function ExecLogTab({currentUser,workers,appointments,setAppointments,execLogs,setExecLogs,finance,setFinance}){
  const workerObj = workers.find(w=>w.id===currentUser.id) || {name:currentUser.name,license:"—"};
  const [mode,setMode]=useState("list"); // list | new | preview
  const [prefillAppt,setPrefillAppt]=useState(null);
  const [extracted,setExtracted]=useState({});
  const [formKey,setFormKey]=useState(0);
  const [previewData,setPreviewData]=useState(null);
  const [viewLog,setViewLog]=useState(null);

  const myLogs = currentUser.role==="מדביר"
    ? execLogs.filter(l=>l.workerId===currentUser.id||l.workerName===workerObj.name)
    : execLogs;

  const pendingAppts = appointments.filter(a=>{
    if(currentUser.role==="מדביר") return a.workerId===currentUser.id&&a.status!=="בוצע"&&a.status!=="בוטל";
    return a.status!=="בוצע"&&a.status!=="בוטל";
  });

  const handleSave=data=>{
    const aptWorker = prefillAppt ? workers.find(w=>w.id===prefillAppt.workerId) : null;
    const wName = aptWorker?.name || workerObj.name;
    const wLicense = aptWorker?.license || workerObj.license;
    const wId = aptWorker?.id || (currentUser.role==="מדביר"?currentUser.id:null);
    const newLog={id:nextId(execLogs),docNum:`EL-${String(Date.now()).slice(-6)}`,apptId:prefillAppt?.id||null,customerId:prefillAppt?.customerId||null,date:data.date,clientName:data.clientName,address:data.address,structureType:data.structureType,pest:data.pest,pestLevel:data.pestLevel,materials:data.materials,extermination_notes:data.extermination_notes,warranty:data.warranty,notes:data.notes,workerId:wId,workerName:wName,workerLicense:wLicense,safetyText:data.safety,paymentDone:data.paymentDone,paymentNote:data.paymentNote};
    setExecLogs(ls=>[newLog,...ls]);
    if(prefillAppt) setAppointments(as=>as.map(a=>a.id===prefillAppt.id?{...a,status:"בוצע",executionLog:newLog}:a));
    setMode("list"); setExtracted({}); setPrefillAppt(null); setPreviewData(null);
    alert("✅ יומן הביצוע נשמר! הוא מופיע ברשימה כאן, ביומן התורים, ובתיק הלקוח.");
  };

  const startNew=(appt=null)=>{setPrefillAppt(appt);setExtracted({});setFormKey(k=>k+1);setMode("new");};

  if(viewLog) return(
    <div style={{background:CLR.dk_bg,minHeight:"100%",padding:20,direction:"rtl",fontFamily:"system-ui,sans-serif"}}>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <DkBtn variant="ghost" onClick={()=>setViewLog(null)}>← חזרה לרשימה</DkBtn>
      </div>
      <ExecLogPreview data={{...viewLog,worker:{name:viewLog.workerName,license:viewLog.workerLicense},materials:viewLog.materials||[]}} onBack={()=>setViewLog(null)} onApprove={()=>setViewLog(null)}/>
    </div>
  );

  if(mode==="preview"&&previewData) return(
    <div style={{background:CLR.dk_bg,minHeight:"100%",padding:20,direction:"rtl",fontFamily:"system-ui,sans-serif"}}>
      <ExecLogPreview data={previewData} onBack={()=>setMode("new")} onApprove={()=>handleSave(previewData)}/>
    </div>
  );

  if(mode==="new") return(
    <div style={{background:CLR.dk_bg,minHeight:"100%",color:CLR.dk_text,direction:"rtl",fontFamily:"system-ui,sans-serif"}}>
      {/* Sub-header */}

        {prefillAppt&&<div style={{background:CLR.dk_dim,borderRadius:8,padding:"6px 14px",fontSize:13,color:CLR.dk_primary}}>
          📅 {prefillAppt.customerName} | {prefillAppt.address} | {prefillAppt.pestType}
        </div>}
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:"24px"}}>
        <div style={{fontSize:15,fontWeight:600,color:CLR.dk_primary,marginBottom:16}}>📋 מילוי יומן ביצוע</div>

    <div style={{background:CLR.dk_bg,minHeight:"100%",padding:20,direction:"rtl",fontFamily:"system-ui,sans-serif",color:CLR.dk_text}}>

      {pendingAppts.length>0&&(
        <div style={{background:CLR.dk_card,border:`1px solid ${CLR.dk_border}`,borderRadius:12,padding:18,marginBottom:20}}>

      </div>

        <div>

                  {!l.paymentDone&&l.paymentNote&&<div style={{fontSize:12,color:CLR.dk_danger,marginTop:4}}>💳 {l.paymentNote}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                  <div style={{fontSize:12,color:CLR.dk_muted}}>{fmtDate(l.date)}</div>

                  <div style={{display:"flex",gap:6}}>
                    <DkBtn variant="ghost" onClick={()=>setViewLog(l)} style={{padding:"4px 12px",fontSize:12}}>👁 צפה</DkBtn>
                    <button onClick={()=>printExecLog(l)} style={{background:"none",border:`1px solid ${CLR.dk_border}`,color:CLR.dk_muted,borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>📄 PDF</button>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>}
        </div>

        {/* Invoice history side panel (office/manager only) */}
        {currentUser.role!=="מדביר"&&(
          <div style={{background:CLR.dk_card,border:`1px solid ${CLR.dk_border}`,borderRadius:12,padding:"16px 18px",position:"sticky",top:16}}>
            <div style={{fontWeight:700,color:CLR.dk_accent,fontSize:14,marginBottom:12}}>🧾 היסטוריית חשבוניות</div>

              const invs=(finance||[]).filter(f=>f.category==="חשבונית");
              if(invs.length===0) return <div style={{fontSize:12,color:CLR.dk_muted}}>אין חשבוניות עדיין</div>;
              return <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:480,overflowY:"auto"}}>
                {invs.map(f=>(
                  <div key={f.id} style={{background:CLR.dk_surface,border:`1px solid ${CLR.dk_border}`,borderRadius:8,padding:"8px 10px"}}>

                      <span style={{color:f.status==="שולם"?"#3ddc84":CLR.dk_accent}}>{f.status}</span>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                      <span style={{fontSize:11,color:CLR.dk_muted}}>{fmtDate(f.date)}</span>

                    </div>
                  </div>
                ))}
              </div>;
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

const calcInitialTab = () => ({
  type:'דירה', applySurcharges:true, rooms:3, levels:1, floors:4,
  yardType:'none', yardExtra:0, sewers:0, apartments:[], showAptSection:false,
  customName:'', customPrice:'', pests:[], pestScopes:{}, extras:{}, itemCounts:{},
  customPrices:{}, customPestNames:{}, exclusions:[], carcassType:'', carcassSearch:false,
});

// Exact pricing engine — ported verbatim from the user's orderDetails useMemo.
// tabsState: { tabId: tabData }. manualOverrides: { uniqueId: {regular,discount,special} }
function computeOrderDetails(tabsState, manualOverrides){
  let grandTotals = { regular:0, discount:0, special:0 };
  let finalItems = [];
  let groupedItems = {};
  Object.keys(tabsState).forEach(tab=>{ groupedItems[tab]={items:[],subtotals:{regular:0,discount:0,special:0}}; });

  const hasBuildingBaseInOrder = Object.keys(tabsState).some(tabKey=>{
    const data=tabsState[tabKey];
    return data.type==='בניין משותף' && data.pests.some(id=>{ const p=PEST_DATA.find(x=>x.id===id); return p&&(p.isBuildingBase||p.isGeneralProperty); });
  });

  Object.keys(tabsState).forEach(tab=>{
    const tabData=tabsState[tab]; if(!tabData) return;
    const hasActivePestsBase=(tabData.pests||[]).length>0;
    const hasApts=(tabData.apartments||[]).length>0;
    if(!hasActivePestsBase && !tabData.customPrice && !hasApts) return;

    let tabPestsRaw=[];
    const standardInsectsCount=(tabData.pests||[]).filter(id=>{ const p=PEST_DATA.find(x=>x.id===id); return p&&p.category==='insects'&&!p.isCustom; }).length;
    const hasStandardInsects=standardInsectsCount>0;
    const isBuildingTab=tabData.type==='בניין משותף';
    const isYardOnly=tabData.yardType==='only';

    (tabData.pests||[]).forEach(pestId=>{
      let pest={...PEST_DATA.find(p=>p.id===pestId)};
      if(!pest.id) return;
      let standaloneReg=pest.regular, standaloneDis=pest.discount, standaloneSpe=pest.special;
      let extraCharge=tabData.extras[pestId]||0;
      let itemDetails='';
      const count=tabData.itemCounts[pestId]||1;

      if(pest.isAmRoach){
        let scope=tabData.pestScopes?.[pestId]||'regular';
        if(scope==='sewers_only'){ pest.isGeneralProperty=false; pest.applyRoomSurcharge=false; standaloneReg=450; standaloneDis=400; standaloneSpe=350; const extraSewers=Math.max(0,count-5); extraCharge+=(extraSewers*40); itemDetails=` (ביובים בלבד - ${count} פתחים)`; }
        else if(scope==='other_only'){ pest.isGeneralProperty=false; pest.applyRoomSurcharge=false; itemDetails=` (אזור ספציפי / מוגדר בלבד)`; }
      }
      if(pest.isCarcass){
        let typeExtra=0;
        if(tabData.carcassType==='חולדה') typeExtra=50;
        if(tabData.carcassType==='חתול') typeExtra=150;
        if(tabData.carcassType==='כלב') typeExtra=250;
        let searchExtra=tabData.carcassSearch?100:0;
        pest.c_typeExtra=typeExtra; pest.c_searchExtra=searchExtra;
        standaloneReg+=typeExtra+searchExtra; standaloneDis+=typeExtra+searchExtra; standaloneSpe+=typeExtra+searchExtra;
        let cDetails=[]; if(tabData.carcassType) cDetails.push(`סוג: ${tabData.carcassType}`); if(tabData.carcassSearch) cDetails.push('כולל חיפוש ואיתור');
        if(cDetails.length>0) itemDetails=` (${cDetails.join(' | ')})`;
      } else if(pest.isAptInBuilding){ return; }
      else if(pest.isRodentIndoor){
        const hasOutdoorRodent=(tabData.pests||[]).includes('rodents_outdoor');
        if(hasStandardInsects&&hasOutdoorRodent){ standaloneReg=count*150; standaloneDis=count*120; standaloneSpe=count*100; }
        else { standaloneReg=450+(count-1)*150; standaloneDis=400+(count-1)*150; standaloneSpe=350+(count-1)*150; }
        itemDetails=` (${count} ביקורים)`;
      } else if(pest.isRodentOutdoor||pest.id==='building_rodents'){
        if(hasStandardInsects){ standaloneReg=count*150; standaloneDis=count*135; standaloneSpe=count*120; }
        else { const extraCount=Math.max(0,count-2); standaloneReg=300+(extraCount*150); standaloneDis=300+(extraCount*150); standaloneSpe=300+(extraCount*150); }
        itemDetails=` (${count} תיבות)`;
      } else if(pest.isRodentRefill){
        const extraCount=Math.max(0,count-4); standaloneReg=300+(extraCount*50); standaloneDis=300+(extraCount*40); standaloneSpe=300+(extraCount*30); itemDetails=` (${count} תיבות)`;
      } else if(pest.isRodentSewers){
        const extraCount=Math.max(0,count-3); standaloneReg=300+(extraCount*50); standaloneDis=300+(extraCount*40); standaloneSpe=300+(extraCount*30); itemDetails=` (${count} ביובים)`;
      } else if(pest.isCustom){
        standaloneReg=Number(tabData.customPrices[pestId])||0; standaloneDis=standaloneReg; standaloneSpe=standaloneReg;
      }

      let currentName=pest.name;
      if(pest.isFreeTextName&&tabData.customPestNames?.[pestId]) currentName=tabData.customPestNames[pestId];

      if(isYardOnly&&pest.isGeneralProperty&&pest.id!=='am_roach'){ standaloneReg=350; standaloneDis=300; standaloneSpe=250; }
      else if(isBuildingTab&&pest.isGeneralProperty&&pest.id!=='am_roach'){
        standaloneReg=Math.max(450,standaloneReg); standaloneDis=Math.max(400,standaloneDis); standaloneSpe=Math.max(350,standaloneSpe);
        const ex=tabData.exclusions||[];
        if(ex.length>0){ const exText=ex.map(e=>e==='אחר'?'החרגה אחרת':`ללא ${e}`).join(', '); itemDetails+=` (החרגות: ${exText})`; }
      }
      tabPestsRaw.push({ ...pest, tab, name:currentName, standaloneReg, standaloneDis, standaloneSpe, count, extraCharge, itemDetails, uniqueId:`${tab}_${pest.id}` });
    });

    let standardItems=tabPestsRaw.filter(p=>!p.isCustom);
    let customItems=tabPestsRaw.filter(p=>p.isCustom);
    standardItems.sort((a,b)=>{
      const getPriority=p=>{ if(p.isBuildingBase) return 4; if(p.isGeneralProperty) return 3; if(p.category==='rodents') return 2; return 1; };
      const pA=getPriority(a),pB=getPriority(b);
      if(pA!==pB) return pB-pA;
      return b.standaloneSpe-a.standaloneSpe;
    });

    let tabFinalItems=[];
    let tabTotals={regular:0,discount:0,special:0};
    const pushItem=(itemData)=>{
      const oR=manualOverrides[itemData.uniqueId]?.regular, oD=manualOverrides[itemData.uniqueId]?.discount, oS=manualOverrides[itemData.uniqueId]?.special;
      const finalReg=(oR!==undefined&&oR!=='')?Number(oR):itemData.calcRegular;
      const finalDis=(oD!==undefined&&oD!=='')?Number(oD):itemData.calcDiscount;
      const finalSpe=(oS!==undefined&&oS!=='')?Number(oS):itemData.calcSpecial;
      tabTotals.regular+=finalReg; tabTotals.discount+=finalDis; tabTotals.special+=finalSpe;
      tabFinalItems.push({ ...itemData, calcRegular:finalReg, calcDiscount:finalDis, calcSpecial:finalSpe });
    };

    standardItems.forEach((pest,index)=>{
      const isAnchor=index===0, isCombo=!isAnchor, anchor=standardItems[0];
      let calcReg=pest.standaloneReg, calcDis=pest.standaloneDis, calcSpe=pest.standaloneSpe;
      let comboText='', comboBadge='';
      if(!isBuildingTab&&pest.isGeneralProperty&&hasBuildingBaseInOrder){
        const isBasicPest=['am_roach','ants','silverfish'].includes(pest.id);
        if(isBasicPest){ calcReg=400; calcDis=350; calcSpe=300; comboText=' (משולב עם בניין - בסיס)'; comboBadge='דירה בבניין (בסיס)'; }
        else { calcReg=Math.round((pest.standaloneReg*0.7)/10)*10; calcDis=Math.round((pest.standaloneDis*0.7)/10)*10; calcSpe=Math.round((pest.standaloneSpe*0.7)/10)*10; comboText=' (משולב עם בניין - 30% הנחה)'; comboBadge='דירה בבניין (חריג)'; }
        if(isCombo&&pest.category==='insects'){ calcReg=100; calcDis=50; calcSpe=50; comboBadge='מזיק נוסף בדירה'; }
      } else if(isCombo){
        if(pest.isAptInBuilding){ /* surcharge */ }
        else if(pest.isGeneralProperty&&anchor.isGeneralProperty){ calcReg=100; calcDis=50; calcSpe=50; comboText=' (שירות חופף)'; comboBadge='הנחת שירות חופף'; }
        else if(pest.category==='insects'){ calcReg=Math.floor((calcReg*0.5)/50)*50||50; calcDis=Math.floor((calcDis*0.5)/50)*50||50; calcSpe=Math.floor((calcSpe*0.5)/50)*50||50; comboText=' (שירות משולב)'; comboBadge='הנחת שילוב מזיק'; }
        else if(pest.category==='removals'){
          if(pest.isCarcass){ let comboBase=50; if(pest.c_typeExtra>0) comboBase+=50; if(pest.c_searchExtra>0) comboBase+=50; calcReg=comboBase+50; calcDis=comboBase; calcSpe=comboBase; comboText=' (מוזל בשילוב)'; comboBadge='מוזל לשילוב'; }
          else { calcReg=150; calcDis=100; calcSpe=100; comboText=' (מוזל בשילוב)'; comboBadge='מוזל לשילוב'; }
        }
        else if(pest.category==='inspections'){ calcReg=100; calcDis=50; calcSpe=50; comboText=' (מוזל בשילוב)'; comboBadge='מוזל לשילוב'; }
        else if(pest.isRodentIndoor){ calcReg=pest.count*150; calcDis=pest.count*120; calcSpe=pest.count*100; comboText=' (מוזל בשילוב שירות)'; comboBadge='מוזל לשילוב'; }
        else if(pest.isRodentOutdoor){ calcReg=pest.count*150; calcDis=pest.count*135; calcSpe=pest.count*120; comboText=' (120₪ לתיבה בשילוב)'; comboBadge='120₪ לתיבה'; }
        else if(pest.isRodentRefill||pest.isRodentSewers){ calcReg=pest.count*50; calcDis=pest.count*40; calcSpe=pest.count*30; comboText=' (מוזל בשילוב שירות)'; comboBadge='מוזל לשילוב'; }
        else if(pest.category==='specials'){ calcReg*=0.8; calcDis*=0.75; calcSpe*=0.7; comboBadge='הנחת שילוב'; }
      }
      pest.itemDetails+=comboText;
      calcReg+=pest.extraCharge; calcDis+=pest.extraCharge; calcSpe+=pest.extraCharge;
      calcReg=Math.round(calcReg/10)*10; calcDis=Math.round(calcDis/10)*10; calcSpe=Math.round(calcSpe/10)*10;
      let oReg=Math.round((pest.standaloneReg+pest.extraCharge)/10)*10, oDis=Math.round((pest.standaloneDis+pest.extraCharge)/10)*10, oSpe=Math.round((pest.standaloneSpe+pest.extraCharge)/10)*10;
      pushItem({ ...pest, isDiscountedCombo:isCombo, comboBadge, calcRegular:calcReg, calcDiscount:calcDis, calcSpecial:calcSpe, origRegular:oReg, origDiscount:oDis, origSpecial:oSpe });
    });

    customItems.forEach(pest=>{
      let cReg=Math.round((pest.standaloneReg+pest.extraCharge)/10)*10, cDis=Math.round((pest.standaloneDis+pest.extraCharge)/10)*10, cSpe=Math.round((pest.standaloneSpe+pest.extraCharge)/10)*10;
      pushItem({ ...pest, isDiscountedCombo:false, calcRegular:cReg, calcDiscount:cDis, calcSpecial:cSpe, origRegular:cReg, origDiscount:cDis, origSpecial:cSpe });
    });

    if(isBuildingTab&&(tabData.apartments||[]).length>0){
      tabData.apartments.forEach(apt=>{
        const p=Number(apt.price);
        pushItem({ uniqueId:`${tab}_apt_${apt.id}`, tab, name:`הדברת דירה בבניין (דירה ${apt.aptNumber}${apt.floor?`, קומה ${apt.floor}`:''})`, itemDetails:`מזיק: ${apt.pestType}`, calcRegular:p, calcDiscount:p, calcSpecial:p, origRegular:p, origDiscount:p, origSpecial:p, isSurcharge:true, comboBadge:apt.pestType.includes('תיקנים')?'הטבת דירה בבניין':'דירה בבניין (הנחה)' });
      });
    }

    const hasActivePests=tabFinalItems.some(i=>!i.isSurcharge);
    if(hasActivePests||tabData.customPrice>0||hasApts){
      const pushSurcharge=(id,name,reg,dis,spe)=>{ let r=Math.round(reg/10)*10,d=Math.round(dis/10)*10,s=Math.round(spe/10)*10; pushItem({uniqueId:id,tab,name,calcRegular:r,calcDiscount:d,calcSpecial:s,origRegular:r,origDiscount:d,origSpecial:s,isSurcharge:true}); };
      if(tabData.applySurcharges&&hasActivePests){
        if(isYardOnly){
          if(tabData.yardExtra>0) pushSurcharge(`${tab}_yard_extra`,`תוספת חצר (גודל חריג)`,tabData.yardExtra,tabData.yardExtra,tabData.yardExtra);
          if(tabData.sewers>3){ const e=tabData.sewers-3,sp=e*40; pushSurcharge(`${tab}_sewers`,`תוספת ${e} פתחי ביוב (מעל 3)`,sp,sp,sp); }
        } else if(isBuildingTab){
          if(tabFinalItems.some(i=>i.isGeneralProperty||i.isBuildingBase)){
            if(tabData.floors>3){ const c50=1,c100=tabData.floors>4?(tabData.floors-4):0; const v=c50*50+c100*100; pushSurcharge(`${tab}_floors`,`תוספת גובה (${tabData.floors} קומות)`,v,v,v); }
            if(tabData.yardType==='none') pushSurcharge(`${tab}_yard_discount`,`זיכוי (ללא חצר)`,-50,-50,-50);
            else if(tabData.yardExtra>0) pushSurcharge(`${tab}_yard_extra`,`תוספת חצר (גודל חריג)`,tabData.yardExtra,tabData.yardExtra,tabData.yardExtra);
            if(tabData.sewers>5){ const e=tabData.sewers-5,sp=e*40; pushSurcharge(`${tab}_sewers`,`תוספת ${e} פתחי ביוב (מעל 5)`,sp,sp,sp); }
          }
        } else {
          if(tabFinalItems.some(i=>i.isGeneralProperty)){
            if(tabData.rooms>3) pushSurcharge(`${tab}_rooms`,`תוספת גודל (${tabData.rooms} חדרים)`,(tabData.rooms-3)*50,(tabData.rooms-3)*50,(tabData.rooms-3)*50);
            if(tabData.levels>1) pushSurcharge(`${tab}_levels`,`תוספת ${tabData.levels} מפלסים`,(tabData.levels-1)*50,(tabData.levels-1)*50,(tabData.levels-1)*50);
            if(tabData.yardType==='included'){ const ry=100+(tabData.yardExtra||0); pushSurcharge(`${tab}_yard`,`הדברת חצר (כולל עד 3 ביובים)`,ry,ry,ry); }
            let freeSewers=tabData.yardType==='included'?3:0;
            if(tabData.sewers>freeSewers){ const e=tabData.sewers-freeSewers,sp=e*40; pushSurcharge(`${tab}_sewers`,`תוספת ${e} פתחי ביוב`,sp,sp,sp); }
          }
        }
      }
      if(tabData.customPrice>0){ const val=Number(tabData.customPrice); pushSurcharge(`${tab}_custom`,tabData.customName||'תוספת מיוחדת',val,val,val); }
    }

    groupedItems[tab].items=tabFinalItems;
    groupedItems[tab].subtotals=tabTotals;
    grandTotals.regular+=tabTotals.regular; grandTotals.discount+=tabTotals.discount; grandTotals.special+=tabTotals.special;
    finalItems.push(...tabFinalItems);
  });

  return { items:finalItems, groupedItems, totals:grandTotals, totalItemsCount:finalItems.length };
}

// ─── Full calculator UI (inline-styled, faithful behavior) ───
function PricingCalculator({onApply,embedded=false,initialProperty={},externalState=null,setExternalState=null}){
  const [internalState,setInternalState]=useState(()=>{ const t=calcInitialTab(); if(initialProperty.type) t.type=initialProperty.type; if(initialProperty.rooms) t.rooms=initialProperty.rooms; if(initialProperty.floors) t.floors=initialProperty.floors; if(initialProperty.type==='בניין משותף'){t.yardType='included';t.sewers=5;} return {tab1:t}; });
  // If a parent passes externalState, use it (so selections persist across remounts)
  const tabsState = externalState || internalState;
  const setTabsState = setExternalState || setInternalState;
  const [activeTab,setActiveTab]=useState('tab1');
  const [activeCat,setActiveCat]=useState('insects');
  const [tier,setTier]=useState('discount');
  const [multiDiscount,setMultiDiscount]=useState(0);
  const [manualPrice,setManualPrice]=useState(null); // null = use auto-calculated
  const [newApt,setNewApt]=useState({floor:'',aptNumber:'',pestType:'תיקנים/נמלים',customPestName:'',price:250});

  const T=tabsState[activeTab];
  const setTab=(k,v)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],[k]:v}}));
  const isBuilding=T.type==='בניין משותף';
  const isYardOnly=T.yardType==='only';

  const order=computeOrderDetails(tabsState,{});
  const tierKey=tier==='regular'?'calcRegular':tier==='discount'?'calcDiscount':'calcSpecial';
  const totalKey=tier;
  const autoGrand=Math.max(0,order.totals[totalKey]-multiDiscount);
  const grand=manualPrice!==null?manualPrice:autoGrand; // manual override takes priority
  const vatIncluded=Math.round(grand-(grand/1.18));
  const beforeVat=grand-vatIncluded;

  const togglePest=id=>{
    const has=(T.pests||[]).includes(id);
    if(has){ const np=T.pests.filter(x=>x!==id); const nc={...T.itemCounts},ns={...T.pestScopes},ncp={...T.customPrices}; delete nc[id];delete ns[id];delete ncp[id]; setTabsState(p=>({...p,[activeTab]:{...p[activeTab],pests:np,itemCounts:nc,pestScopes:ns,customPrices:ncp}})); }
    else { setTabsState(p=>({...p,[activeTab]:{...p[activeTab],pests:[...(p[activeTab].pests||[]),id],itemCounts:{...p[activeTab].itemCounts,[id]:1}}})); }
  };
  const setCount=(id,v)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],itemCounts:{...p[activeTab].itemCounts,[id]:Math.max(1,v)}}}));
  const setCustomPrice=(id,v)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],customPrices:{...p[activeTab].customPrices,[id]:Math.max(0,parseInt(v)||0)}}}));
  const setScope=(id,v)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],pestScopes:{...p[activeTab].pestScopes,[id]:v}}}));
  const setCustomName=(id,v)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],customPestNames:{...p[activeTab].customPestNames,[id]:v}}}));
  const setExtra=(id,v)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],extras:{...p[activeTab].extras,[id]:Math.max(0,parseInt(v)||0)}}}));
  const addExtra=(id,amt)=>setTabsState(p=>({...p,[activeTab]:{...p[activeTab],extras:{...p[activeTab].extras,[id]:Math.max(0,(p[activeTab].extras[id]||0)+amt)}}}));

  const addTab=()=>{ const id=`tab_${Date.now()}`; setTabsState(p=>({...p,[id]:calcInitialTab()})); setActiveTab(id); };
  const removeTab=(id)=>{ if(Object.keys(tabsState).length===1){alert('חייב להישאר נכס אחד');return;} const ns={...tabsState}; delete ns[id]; setTabsState(ns); if(activeTab===id) setActiveTab(Object.keys(ns)[0]); };

  const toggleExclusion=(area)=>{
    const cur=T.exclusions||[]; const isEx=cur.includes(area);
    let ne=isEx?cur.filter(a=>a!==area):[...cur,area];
    let upd={...T,exclusions:ne};
    if(area==='חצר'){ upd.yardType=isEx?'none':'included'; if(isEx)upd.yardExtra=0; }
    if(area==='ביובים') upd.sewers=isEx?5:0;
    setTabsState(p=>({...p,[activeTab]:upd}));
  };
  const addApt=()=>{
    const aptNum=newApt.aptNumber.trim()||'לא צוין';
    const finalPest=newApt.pestType==='אחר'&&newApt.customPestName.trim()?newApt.customPestName.trim():newApt.pestType;
    const apt={...newApt,aptNumber:aptNum,pestType:finalPest,id:Date.now().toString()};
    setTab('apartments',[...(T.apartments||[]),apt]);
    setNewApt({floor:'',aptNumber:'',pestType:'תיקנים/נמלים',customPestName:'',price:250});
  };

  const catPests=PEST_DATA.filter(p=>p.category===activeCat&&p.id!=='apt_in_building');
  const basePackages=PEST_DATA.filter(p=>p.category==='base_packages');

  const applyResult=()=>{
    const pestNames=order.items.filter(i=>!i.isSurcharge).map(i=>i.name);
    // Client-friendly breakdown: per property, only the final price each pays (no combo/discount internals).
    const properties=[];
    Object.keys(order.groupedItems).forEach((t,idx)=>{
      const g=order.groupedItems[t]; if(g.items.length===0) return;
      const td=tabsState[t]||{};
      const sub=g.subtotals[totalKey];
      // pests for this property (non-surcharge, non-apartment) for guidance
      const pestIds=(td.pests||[]).filter(id=>{const p=PEST_DATA.find(x=>x.id===id);return p&&!p.isAptInBuilding;});
      const guidance=[];
      const seen=new Set();
      pestIds.forEach(id=>{
        const p=PEST_DATA.find(x=>x.id===id); if(!p) return;
        guidance.push({pest:p.name,prep:p.prep,during:p.during,returnTime:p.returnTime,washing:p.washing,warranty:p.warranty});
      });
      properties.push({
        label:`נכס ${idx+1}: ${td.type||"נכס"}${td.type==="בניין משותף"&&td.floors?` (${td.floors} קומות)`:""}`,
        type:td.type, price:sub,
        services:g.items.filter(i=>!i.isSurcharge).map(i=>i.name),
        areas: td.type==="בניין משותף" ? (td.exclusions&&td.exclusions.length?BUILDING_AREAS_NOTE(td.exclusions):"חדר מדרגות, מקלט, חצר, ביובים"):null,
        guidance,
      });
    });
    onApply&&onApply({price:grand,priceWithVat:grand,pests:pestNames,properties,total:grand});
  };

  const chip=(active)=>({padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:active?700:500,background:active?CLR.primary:CLR.surface,color:active?"#fff":CLR.muted,border:`1px solid ${active?CLR.primary:CLR.border}`});
  const numInput={width:"100%",padding:"7px 9px",borderRadius:8,border:`1px solid ${CLR.border}`,fontSize:14,boxSizing:"border-box",textAlign:"center"};

  return <div style={{direction:"rtl"}}>
    {/* Property tabs */}
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      {Object.keys(tabsState).map((tk,i)=>(
        <span key={tk} style={{display:"flex",alignItems:"center"}}>
          <button type="button" onClick={()=>setActiveTab(tk)} style={{...chip(activeTab===tk),borderRadius:Object.keys(tabsState).length>1?"8px 0 0 8px":8}}>
            נכס {i+1}: {tabsState[tk].type}
          </button>
          {Object.keys(tabsState).length>1&&<button type="button" onClick={()=>removeTab(tk)} style={{background:"#fee2e2",color:CLR.danger,border:"none",borderRadius:"0 8px 8px 0",padding:"7px 8px",cursor:"pointer",fontSize:12}}>✕</button>}
        </span>
      ))}
      <button type="button" onClick={addTab} style={{...chip(false),borderStyle:"dashed",color:CLR.primary}}>+ הוסף נכס</button>
    </div>

    {/* Property config */}
    <div style={{background:CLR.surface,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"end",marginBottom:10}}>
        <div style={{flex:"1 1 160px"}}>
          <label style={{fontSize:12,color:CLR.muted,display:"block",marginBottom:4}}>סוג נכס</label>
          <select value={T.type} onChange={e=>{const v=e.target.value;setTab('type',v);if(v==='בניין משותף'){setTimeout(()=>{setTabsState(p=>({...p,[activeTab]:{...p[activeTab],type:v,yardType:'included',sewers:5}}));},0);}else{setTimeout(()=>{setTabsState(p=>({...p,[activeTab]:{...p[activeTab],type:v,yardType:'none',sewers:0}}));},0);}}} style={{...numInput,textAlign:"right",fontWeight:600}}>
            {CALC_PROPERTY_TYPES.map(pt=><option key={pt} value={pt}>{pt}</option>)}
          </select>
        </div>
        <button type="button" onClick={()=>setTab('applySurcharges',!T.applySurcharges)} style={{padding:"9px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,border:"none",background:T.applySurcharges?"#16a34a":"#cbd5e1",color:T.applySurcharges?"#fff":"#475569"}}>
          {T.applySurcharges?"✅ תוספות פעילות":"❌ כבויות (נקודתי)"}
        </button>
      </div>

      {T.applySurcharges&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10}}>
        {!isBuilding&&<>
          <div><label style={{fontSize:11,color:CLR.muted,display:"block",marginBottom:3,textAlign:"center"}}>חדרים</label>
            <input type="number" min={0} value={T.rooms} onChange={e=>setTab('rooms',parseInt(e.target.value)||0)} style={numInput}/></div>
          <div><label style={{fontSize:11,color:CLR.muted,display:"block",marginBottom:3,textAlign:"center"}}>מפלסים</label>
            <input type="number" min={0} value={T.levels} onChange={e=>setTab('levels',parseInt(e.target.value)||0)} style={numInput}/></div>
        </>}
        {isBuilding&&<div style={{gridColumn:"span 2"}}><label style={{fontSize:11,color:CLR.muted,display:"block",marginBottom:3,textAlign:"center"}}>קומות בבניין</label>
          <input type="number" min={1} value={T.floors} onChange={e=>setTab('floors',parseInt(e.target.value)||1)} style={numInput}/></div>}
        <div><label style={{fontSize:11,color:CLR.muted,display:"block",marginBottom:3,textAlign:"center"}}>הדברת חצר</label>
          <select value={T.yardType} onChange={e=>{const v=e.target.value;setTab('yardType',v);if(v==='none')setTab('yardExtra',0);else if(v==='only'){setTab('rooms',0);setTab('levels',0);setTab('sewers',Math.max(3,T.sewers));}}} style={numInput}>
            <option value="none">ללא</option><option value="included">כולל</option><option value="only">רק חצר/חוץ</option>
          </select></div>
        <div><label style={{fontSize:11,color:CLR.muted,display:"block",marginBottom:3,textAlign:"center"}}>פתחי ביוב</label>
          <input type="number" min={0} value={T.sewers} onChange={e=>setTab('sewers',parseInt(e.target.value)||0)} style={numInput}/></div>
      </div>}

      {/* Building exclusions */}
      {isBuilding&&T.applySurcharges&&<div style={{marginTop:12}}>
        <div style={{fontSize:11,color:CLR.muted,marginBottom:6}}>אזורים משותפים (לחץ להחרגה):</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {['מדרגות','מקלט','חצר','ביובים','אחר'].map(area=>{
            const isEx=(T.exclusions||[]).includes(area);
            return <button key={area} type="button" onClick={()=>toggleExclusion(area)} style={{padding:"5px 11px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,border:`1px solid ${isEx?"#fca5a5":"#86efac"}`,background:isEx?"#fee2e2":"#dcfce7",color:isEx?"#991b1b":"#166534"}}>
              {isEx?`✕ ללא ${area}`:`✓ כולל ${area}`}
            </button>;
          })}
        </div>
      </div>}

      {/* Apartments in building */}
      {isBuilding&&T.applySurcharges&&<div style={{marginTop:12,background:"#fff",borderRadius:8,padding:"10px 12px",border:`1px solid ${CLR.border}`}}>
        <div style={{fontSize:12,fontWeight:700,color:CLR.primary,marginBottom:8}}>🏢 דירות נלוות בבניין (הטבה)</div>
        {(T.apartments||[]).map(apt=>(
          <div key={apt.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:CLR.primaryLight,borderRadius:6,padding:"6px 10px",marginBottom:5,fontSize:12}}>
            <span>דירה {apt.aptNumber} (קומה {apt.floor||"-"}) · {apt.pestType}</span>
            <span style={{display:"flex",gap:8,alignItems:"center"}}><b>{apt.price}₪</b><button type="button" onClick={()=>setTab('apartments',T.apartments.filter(a=>a.id!==apt.id))} style={{background:"none",border:"none",color:CLR.danger,cursor:"pointer"}}>✕</button></span>
          </div>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:6}}>
          <input placeholder="מס׳ דירה" value={newApt.aptNumber} onChange={e=>setNewApt({...newApt,aptNumber:e.target.value})} style={{...numInput,textAlign:"right"}}/>
          <input placeholder="קומה" value={newApt.floor} onChange={e=>setNewApt({...newApt,floor:e.target.value})} style={{...numInput,textAlign:"right"}}/>
          <input type="number" placeholder="מחיר" value={newApt.price} onChange={e=>setNewApt({...newApt,price:Number(e.target.value)})} style={numInput}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <select value={newApt.pestType} onChange={e=>{const v=e.target.value;setNewApt({...newApt,pestType:v,price:v==='תיקנים/נמלים'?250:newApt.price});}} style={{...numInput,textAlign:"right",flex:1}}>
            <option value="תיקנים/נמלים">תיקנים/נמלים (250₪)</option><option value="אחר">אחר</option>
          </select>
          {newApt.pestType==='אחר'&&<input placeholder="שם מזיק" value={newApt.customPestName} onChange={e=>setNewApt({...newApt,customPestName:e.target.value})} style={{...numInput,textAlign:"right",flex:1}}/>}
        </div>
        <button type="button" onClick={addApt} style={{width:"100%",marginTop:6,background:CLR.primary,color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontWeight:600,fontSize:13}}>+ הוסף דירה</button>
      </div>}

      {/* Custom surcharge */}
      <div style={{display:"flex",gap:6,marginTop:10}}>
        <input placeholder="תוספת מיוחדת (מחסן, יח' דיור)..." value={T.customName} onChange={e=>setTab('customName',e.target.value)} style={{...numInput,textAlign:"right",flex:2}}/>
        <input type="number" placeholder="₪" value={T.customPrice} onChange={e=>setTab('customPrice',e.target.value)} style={{...numInput,flex:1}}/>
      </div>
    </div>

    {/* Category chips */}
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
      {Object.values(CALC_CATEGORIES).map(c=>{
        const cnt=(T.pests||[]).filter(id=>PEST_DATA.find(p=>p.id===id)?.category===c.id).length;
        return <button key={c.id} type="button" onClick={()=>setActiveCat(c.id)} style={{...chip(activeCat===c.id),display:"flex",alignItems:"center",gap:5}}>
          <span>{c.icon}</span>{c.title}{cnt>0&&<span style={{background:CLR.danger,color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:11,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>{cnt}</span>}
        </button>;
      })}
    </div>

    {/* Pest list */}
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
      {catPests.map(pest=>{
        const on=(T.pests||[]).includes(pest.id);
        return <div key={pest.id} style={{border:`2px solid ${on?CLR.primary:CLR.border}`,borderRadius:10,padding:"10px 14px",background:on?CLR.primaryLight:"#fff"}}>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <input type="checkbox" checked={on} onChange={()=>togglePest(pest.id)}/>
            <span style={{flex:1,fontWeight:600,fontSize:14}}>{pest.name}</span>
            {on&&!pest.isCustom&&<span style={{fontSize:11,color:CLR.primary,background:CLR.primaryLight,padding:"2px 8px",borderRadius:10}}>✓ נבחר</span>}
          </label>
          {pest.info&&<div style={{fontSize:11,color:CLR.muted,marginTop:5}}>{pest.info}</div>}
          {on&&<div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            {pest.isCustom&&<input type="number" placeholder={pest.customLabel||"מחיר ₪"} value={T.customPrices[pest.id]||""} onChange={e=>setCustomPrice(pest.id,e.target.value)} style={{...numInput,width:140}}/>}
            {pest.isFreeTextName&&<input placeholder="שם השירות" value={T.customPestNames[pest.id]||""} onChange={e=>setCustomName(pest.id,e.target.value)} style={{...numInput,textAlign:"right",width:160}}/>}
            {(pest.isRodentIndoor||pest.isRodentOutdoor||pest.isRodentRefill||pest.isRodentSewers)&&<span style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:CLR.muted}}>כמות:<input type="number" min={1} value={T.itemCounts[pest.id]||1} onChange={e=>setCount(pest.id,parseInt(e.target.value)||1)} style={{...numInput,width:60}}/></span>}
            {pest.isAmRoach&&<select value={T.pestScopes[pest.id]||'regular'} onChange={e=>setScope(pest.id,e.target.value)} style={{...numInput,textAlign:"right",width:170}}>
              <option value="regular">טיפול רגיל (כל הבית)</option><option value="sewers_only">ביובים בלבד</option><option value="other_only">אזור ספציפי בלבד</option>
            </select>}
            {pest.isCarcass&&<>
              <select value={T.carcassType} onChange={e=>setTab('carcassType',e.target.value)} style={{...numInput,textAlign:"right",width:130}}>
                <option value="">סוג פגר</option><option value="יונה/עכבר">יונה/עכבר</option><option value="חולדה">חולדה (+50)</option><option value="חתול">חתול (+150)</option><option value="כלב">כלב (+250)</option>
              </select>
              <label style={{fontSize:12,display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}><input type="checkbox" checked={T.carcassSearch} onChange={e=>setTab('carcassSearch',e.target.checked)}/>חיפוש (+100)</label>
            </>}
          </div>}
          {/* Infestation / complexity surcharge */}
          {on&&!pest.isCustom&&<div style={{marginTop:8}}>
            <div style={{fontSize:11,color:CLR.muted,marginBottom:4}}>תוספת רמת נגיעות / גודל חריג / בעיית גישה (₪):</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <input type="number" value={T.extras[pest.id]||""} onChange={e=>setExtra(pest.id,e.target.value)} placeholder="0" style={{...numInput,width:70}}/>
              {[25,50,100].map(amt=><button key={amt} type="button" onClick={()=>addExtra(pest.id,amt)} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${CLR.border}`,background:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:CLR.muted}}>+{amt}₪</button>)}
            </div>
          </div>}
          {/* Client guidance */}
          {on&&(pest.prep||pest.during||pest.returnTime||pest.washing)&&<div style={{marginTop:10,background:"#fff",border:`1px solid ${CLR.border}`,borderRight:`4px solid ${CLR.primary}`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:12,fontWeight:700,color:CLR.primary,marginBottom:6}}>ℹ️ הנחיות ללקוח (להקריא בשיחה):</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 12px",fontSize:11,lineHeight:1.6}}>
              {pest.prep&&<div><b>לפני:</b> <span style={{color:CLR.muted}}>{pest.prep}</span></div>}
              {pest.during&&<div><b>בזמן:</b> <span style={{color:CLR.muted}}>{pest.during}</span></div>}
              {pest.returnTime&&<div><b>חזרה:</b> <span style={{color:CLR.muted}}>{pest.returnTime}</span></div>}
              {pest.washing&&<div><b>שטיפה:</b> <span style={{color:CLR.muted}}>{pest.washing}</span></div>}
            </div>
            {pest.warranty&&<div style={{marginTop:6,fontSize:11}}><b>אחריות:</b> <span style={{color:CLR.primary,fontWeight:600}}>{pest.warranty}</span></div>}
          </div>}
        </div>;
      })}
    </div>

    {/* Manual price override — the displayed price IS the final price */}
    <div style={{background:"#fff",border:`1px solid #d1d5db`,borderRadius:10,padding:"12px 16px",marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:CLR.primary,marginBottom:8}}>✏️ עריכת מחיר סופי</div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:11,color:CLR.muted,display:"block",marginBottom:4}}>מחיר מחושב אוטומטי (ניתן לשנות ידנית)</label>
          <input type="number" value={manualPrice!==null?manualPrice:grand} onChange={e=>setManualPrice(parseInt(e.target.value)||0)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1px solid #d1d5db`,fontSize:18,fontWeight:700,background:"#f9fafb",boxSizing:"border-box"}}/>
        </div>
        {manualPrice!==null&&<button type="button" onClick={()=>setManualPrice(null)} style={{background:"none",border:`1px solid ${CLR.border}`,borderRadius:8,padding:"8px",cursor:"pointer",fontSize:12,color:CLR.muted,whiteSpace:"nowrap"}}>↺ איפוס</button>}
      </div>
      <div style={{display:"flex",gap:6,marginTop:8}}>
        <span style={{fontSize:12,color:CLR.muted}}>מחיר לפי טיפוס:</span>
        {[["regular","רגיל"],["discount","מבצע"],["special","מיוחד"]].map(([t,l])=>(
          <button key={t} type="button" onClick={()=>{setTier(t);setManualPrice(null);}} style={{padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:tier===t?700:400,border:`1px solid ${tier===t?CLR.primary:CLR.border}`,background:tier===t?CLR.primaryLight:"transparent",color:tier===t?CLR.primary:CLR.muted}}>
            {l} (₪{Math.max(0,order.totals[t]-multiDiscount)})
          </button>
        ))}
      </div>
    </div>

    {/* Breakdown */}
    {order.items.length>0&&<div style={{background:CLR.surface,borderRadius:10,padding:"12px 16px",marginBottom:12}}>
      {order.items.map((it,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0",color:it.isSurcharge?CLR.muted:"#111"}}>
          <span>{it.isSurcharge?"↳ ":""}{it.name}{it.itemDetails||""} {it.comboBadge?<span style={{fontSize:10,background:CLR.accent+"33",color:"#92400e",padding:"1px 6px",borderRadius:10,marginRight:4}}>{it.comboBadge}</span>:null}</span>
          <span style={{fontWeight:600}}>₪{it[tierKey]}</span>
        </div>
      ))}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:8,borderTop:`1px solid ${CLR.border}`}}>

      </div>

    {/* Per-property breakdown (when multiple properties) */}
    {Object.keys(order.groupedItems).filter(t=>order.groupedItems[t].items.length>0).length>1&&<div style={{background:"#fff",border:`1px solid ${CLR.border}`,borderRadius:10,padding:"12px 16px",marginBottom:12}}>

      {Object.keys(order.groupedItems).map((t,i)=>{
        const g=order.groupedItems[t]; if(g.items.length===0) return null;
        const sub=g.subtotals[totalKey];
        const tName=tabsState[t]?.type||"נכס";
        return <div key={t} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:`1px solid ${CLR.surface}`}}>
          <span>נכס {i+1}: {tName}</span><span style={{fontWeight:600}}>₪{sub}</span>

      })}
      {multiDiscount>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:CLR.danger,padding:"4px 0"}}><span>הנחת ריבוי שירותים</span><span>−₪{multiDiscount}</span></div>}
      <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,color:CLR.primary,paddingTop:6,marginTop:2,borderTop:`1px solid ${CLR.border}`}}><span>סה"כ כולל</span><span>₪{grand}</span></div>
    </div>}

    {/* Total — the displayed price IS the final price; VAT is extracted from within it */}
    <div style={{background:CLR.primaryLight,borderRadius:12,padding:"14px 18px",marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:700,color:CLR.primary,marginBottom:6}}><span>💰 מחיר סופי ללקוח</span><span>₪{grand}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:CLR.muted,borderTop:`1px solid ${CLR.border}`,paddingTop:8}}><span>מתוכו לפני מע"מ</span><span>₪{beforeVat}</span></div>

    </div>

    {onApply&&<Btn full onClick={applyResult} disabled={order.totalItemsCount===0}>✅ החל מחיר זה על ההזמנה (₪{grand})</Btn>}
  </div>;
}

function CustomerSearchSelect({customers, value, onChange}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const ref=React.useRef(null);
  const selected=customers.find(c=>c.id===parseInt(value));
  React.useEffect(()=>{
    const close=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[]);
  const filtered=q.length>0
    ? customers.filter(c=>c.name.includes(q)||c.phone.includes(q)||(c.address||"").includes(q)).slice(0,8)
    : customers.slice(0,8);
  return <div ref={ref} style={{position:"relative"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+CLR.border,fontSize:14,boxSizing:"border-box",background:"#f9fafb",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:38}}>
      <span style={{color:selected?"#111":CLR.muted}}>{selected?selected.name+" ("+selected.phone+")":"-- בחר לקוח --"}</span>
      <span style={{color:CLR.muted,fontSize:12}}>{open?"▲":"▼"}</span>
    </div>
    {open&&<div style={{position:"absolute",top:"100%",right:0,left:0,zIndex:500,background:"#fff",border:"1px solid "+CLR.border,borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",maxHeight:280,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"8px 10px",borderBottom:"1px solid #f3f4f6"}}>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="חפש שם, טלפון, כתובת..."
          style={{width:"100%",border:"none",outline:"none",fontSize:13,background:"transparent",direction:"rtl"}}
          onClick={e=>e.stopPropagation()}/>
      </div>
      <div style={{overflowY:"auto",flex:1}}>
        <div onClick={()=>{onChange("",null);setOpen(false);setQ("");}} style={{padding:"8px 12px",cursor:"pointer",fontSize:13,color:CLR.muted,borderBottom:"1px solid #f9fafb"}}
          onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"} onMouseLeave={e=>e.currentTarget.style.background=""}>
          -- ללא לקוח --
        </div>
        {filtered.map(c=>(
          <div key={c.id} onClick={()=>{onChange(c.id,c);setOpen(false);setQ("");}} style={{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid #f9fafb"}}
            onMouseEnter={e=>e.currentTarget.style.background="#f0f9f4"} onMouseLeave={e=>e.currentTarget.style.background=""}>
            <div style={{fontWeight:600,fontSize:13,color:"#111"}}>{c.name}</div>
            <div style={{fontSize:11,color:CLR.muted}}>{c.phone} · {(c.address||"").slice(0,40)}</div>
          </div>
        ))}
        {filtered.length===0&&<div style={{padding:"16px 12px",textAlign:"center",color:CLR.muted,fontSize:13}}>לא נמצאו לקוחות</div>}
      </div>
    </div>}
  </div>;
}

// Execution-log modal launched from the calendar — dark themed, prefilled from the appointment
function ExecLogModalInline({appt,worker,onClose,onSave,onSaveInvoice,currentUser}){
  const [step,setStep]=useState("form"); // form | preview | done
  const [previewData,setPreviewData]=useState(null);
  const [savedLog,setSavedLog]=useState(null);
  // invoice options on the done screen
  const [makeInvoice,setMakeInvoice]=useState(true);
  const [payMethod,setPayMethod]=useState("מזומן");
  const [payNow,setPayNow]=useState(true);
  const [savedInvoice,setSavedInvoice]=useState(null);

  const handleApprove=()=>{
    const log=onSave(previewData); // returns the saved log with id/docNum
    setSavedLog(log);
    setStep("done");
  };

  const handleCreateInvoice=()=>{
    const vat=Math.round(appt.price*0.18);
    const docNum=`INV-${String(Date.now()).slice(-5)}`;
    const inv={type:"הכנסה",category:"חשבונית",customer:appt.customerName,customerId:appt.customerId,
      amount:appt.price,date:todayStr(),status:payNow?"שולם":"חוב",invoiceNum:docNum,apptId:appt.id,
      phone:"",address:appt.address,pestType:appt.pestType,workerName:appt.workerName,payMethod};
    const saved=onSaveInvoice(inv);
    setSavedInvoice(saved||inv);
  };

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:CLR.dk_bg,border:`1px solid ${CLR.dk_border}`,borderRadius:16,padding:24,width:680,maxWidth:"98vw",maxHeight:"92vh",overflow:"auto",direction:"rtl",color:CLR.dk_text}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <h2 style={{margin:0,color:CLR.dk_primary,fontSize:17}}>📋 יומן ביצוע</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:CLR.dk_muted}}>✕</button>
      </div>
      <div style={{background:CLR.dk_dim,borderRadius:8,padding:"8px 14px",marginBottom:16,fontSize:13,color:CLR.dk_primary}}>
        📅 <b>{appt.customerName}</b> | {appt.address} | {appt.pestType} | {fmtDate(appt.date)} {appt.time}
      </div>

      {step==="form"&&<ExecLogForm worker={worker} prefillAppt={appt} initialData={null} onPreview={d=>{setPreviewData(d);setStep("preview");}}/>}

      {step==="preview"&&<ExecLogPreview data={previewData} onBack={()=>setStep("form")} onApprove={handleApprove}/>}

      {step==="done"&&<div>
        <div style={{textAlign:"center",padding:"10px 0 20px"}}>
          <div style={{fontSize:48}}>✅</div>
          <div style={{fontSize:18,fontWeight:700,color:CLR.dk_primary,marginTop:8}}>יומן הביצוע נשמר!</div>
        </div>

        {/* Invoice section */}
        <div style={{background:CLR.dk_card,border:`1px solid ${CLR.dk_border}`,borderRadius:12,padding:"16px 18px",marginBottom:16}}>
          <div style={{fontWeight:700,color:CLR.dk_accent,fontSize:15,marginBottom:12}}>🧾 חשבונית</div>
          {!savedInvoice ? <>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,cursor:"pointer",marginBottom:12,color:CLR.dk_text}}>
              <input type="checkbox" checked={makeInvoice} onChange={e=>setMakeInvoice(e.target.checked)}/> להפיק חשבונית עבור טיפול זה (₪{appt.price} + מע"מ)
            </label>
            {makeInvoice&&<div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div><label style={{fontSize:12,color:CLR.dk_muted,display:"block",marginBottom:4}}>אמצעי תשלום</label>
                  <select value={payMethod} onChange={e=>setPayMethod(e.target.value)} style={{width:"100%",background:CLR.dk_surface,border:`1px solid ${CLR.dk_border}`,borderRadius:8,padding:"8px 10px",color:CLR.dk_text,fontSize:14,fontFamily:"inherit"}}>
                    {["מזומן","העברה בנקאית","ביט","PayBox","צ'ק","אשראי"].map(m=><option key={m}>{m}</option>)}
                  </select></div>
                <div><label style={{fontSize:12,color:CLR.dk_muted,display:"block",marginBottom:4}}>סטטוס תשלום</label>
                  <select value={payNow?"שולם":"חוב"} onChange={e=>setPayNow(e.target.value==="שולם")} style={{width:"100%",background:CLR.dk_surface,border:`1px solid ${CLR.dk_border}`,borderRadius:8,padding:"8px 10px",color:CLR.dk_text,fontSize:14,fontFamily:"inherit"}}>
                    <option value="שולם">התקבל תשלום</option><option value="חוב">טרם שולם (חוב)</option>
                  </select></div>
              </div>
              <DkBtn onClick={handleCreateInvoice} style={{width:"100%"}}>🧾 הפק חשבונית</DkBtn>
            </div>}
          </> : <div style={{textAlign:"center",color:"#3ddc84",fontWeight:600,fontSize:14}}>
            ✅ חשבונית {savedInvoice.invoiceNum} נוצרה ({savedInvoice.status})
          </div>}
        </div>

        {/* Two PDF buttons */}
        <div style={{fontWeight:700,color:CLR.dk_text,fontSize:14,marginBottom:10}}>📄 הפקת מסמכים</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <DkBtn variant="ghost" onClick={()=>printExecLog(savedLog||previewData)} style={{padding:"14px"}}>
            📋 PDF — יומן ביצוע
          </DkBtn>
          <DkBtn variant="ghost" onClick={()=>{
            if(!savedInvoice){alert("צריך להפיק חשבונית קודם");return;}
            printInvoice(savedInvoice);
          }} style={{padding:"14px",opacity:savedInvoice?1:0.5}}>
            🧾 PDF — חשבונית
          </DkBtn>
        </div>
        <div style={{fontSize:12,color:CLR.dk_muted,textAlign:"center",marginBottom:16}}>
          כל מסמך נפתח בחלון נפרד — לחץ "🖨️ הדפס / שמור PDF" כדי לשמור או לשלוח ללקוח.
        </div>

        <DkBtn onClick={onClose} style={{width:"100%"}}>סיום</DkBtn>
      </div>}
    </div>
  </div>;
}

// ─── Print Day Schedule ───────────────────────────
function printDaySchedule(date, appointments, workers){
  const toISO=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const iso=typeof date==="string"?date:toISO(date);
  const dayAppts=[...appointments.filter(a=>a.date===iso)].sort((a,b)=>a.time.localeCompare(b.time));
  const dayNames=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const d=new Date(iso+"T12:00:00");
  const dayLabel="יום "+dayNames[d.getDay()]+" "+d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();

  // Group by worker
  const byWorker={};
  dayAppts.forEach(a=>{
    const key=a.workerName||"לא שובץ";
    if(!byWorker[key]) byWorker[key]=[];
    byWorker[key].push(a);
  });

  const workerSections=Object.entries(byWorker).map(([name,appts])=>{
    const wColor=workers.find(w=>w.name===name)?.color||"#1a5c3a";
    const rows=appts.map(a=>`
      <tr style="border-bottom:1px solid #e5e7eb;">
        <td style="padding:8px 12px;font-weight:600;">${a.time}${a.timeWindow?" ("+a.timeWindow+")":""}</td>
        <td style="padding:8px 12px;">${a.customerName}</td>
        <td style="padding:8px 12px;">${a.pestType}</td>
        <td style="padding:8px 12px;">${a.address}</td>
        <td style="padding:8px 12px;font-weight:700;">₪${a.price}</td>
        <td style="padding:8px 12px;color:#6b7280;font-size:12px;">${a.notes||""}</td>
      </tr>`).join("");
    return `
      <div style="margin-bottom:24px;">
        <div style="background:${wColor};color:#fff;padding:8px 16px;border-radius:8px 8px 0 0;font-weight:700;font-size:15px;">
          👷 ${name} — ${appts.length} תורים · סה"כ: ₪${appts.reduce((s,a)=>s+a.price,0).toLocaleString()}
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e5e7eb;border-top:none;">
          <thead><tr style="background:#f9fafb;">
            <th style="padding:7px 12px;text-align:right;font-weight:600;">שעה</th>
            <th style="padding:7px 12px;text-align:right;font-weight:600;">לקוח</th>
            <th style="padding:7px 12px;text-align:right;font-weight:600;">מזיק</th>
            <th style="padding:7px 12px;text-align:right;font-weight:600;">כתובת</th>
            <th style="padding:7px 12px;text-align:right;font-weight:600;">מחיר</th>
            <th style="padding:7px 12px;text-align:right;font-weight:600;">הערות</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join("");

  const total=dayAppts.reduce((s,a)=>s+a.price,0);
  openPrintWindow("רשימת יום "+dayLabel, `
    <div style="max-width:900px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1a5c3a;padding-bottom:14px;margin-bottom:20px;">
        <div><div style="font-size:22px;font-weight:700;color:#1a5c3a;">🦟 ${COMPANY.name}</div></div>
        <div style="text-align:left;">
          <div style="font-size:18px;font-weight:700;color:#1a5c3a;">רשימת עבודה יומית</div>
          <div style="font-size:14px;color:#555;">${dayLabel}</div>
        </div>
      </div>
      <div style="display:flex;gap:20px;margin-bottom:20px;font-size:13px;">
        <div><b>סה"כ תורים:</b> ${dayAppts.length}</div>
        <div><b>סה"כ הכנסות:</b> ₪${total.toLocaleString()}</div>
        <div><b>מדבירים:</b> ${Object.keys(byWorker).length}</div>
      </div>
      ${workerSections}
    </div>`);
}

function exportMonthlyReport(year,month,appointments,finance,workers){
  const key=year+"-"+String(month+1).padStart(2,"0");
  const mAppts=appointments.filter(a=>(a.date||"").startsWith(key));
  const mFin=finance.filter(f=>(f.date||"").startsWith(key));
  const names=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  const income=mFin.filter(f=>f.type==="הכנסה").reduce((s,f)=>s+f.amount,0);
  const expense=mFin.filter(f=>f.type==="הוצאה").reduce((s,f)=>s+f.amount,0);
  const wStats={};mAppts.forEach(a=>{if(!wStats[a.workerName])wStats[a.workerName]={t:0,d:0,v:0};wStats[a.workerName].t++;if(a.status==="בוצע"){wStats[a.workerName].d++;wStats[a.workerName].v+=a.price;}});
  const pStats={};mAppts.forEach(a=>{pStats[a.pestType]=(pStats[a.pestType]||0)+1;});
  const wRows=Object.entries(wStats).map(([n,s])=>`<tr><td style="padding:7px 10px;">${n}</td><td style="padding:7px 10px;text-align:center;">${s.t}</td><td style="padding:7px 10px;text-align:center;">${s.d}</td><td style="padding:7px 10px;text-align:left;font-weight:700;">₪${s.v.toLocaleString()}</td></tr>`).join("");
  const pRows=Object.entries(pStats).sort((a,b)=>b[1]-a[1]).map(([p,c])=>`<tr><td style="padding:7px 10px;">${p}</td><td style="padding:7px 10px;text-align:center;font-weight:700;">${c}</td></tr>`).join("");
  const aRows=mAppts.sort((a,b)=>a.date.localeCompare(b.date)).map(a=>`<tr style="border-bottom:1px solid #e5e7eb;"><td style="padding:6px 10px;">${fmtDate(a.date)}</td><td style="padding:6px 10px;">${a.customerName}</td><td style="padding:6px 10px;">${a.pestType}</td><td style="padding:6px 10px;">${a.workerName}</td><td style="padding:6px 10px;font-weight:700;">₪${a.price}</td><td style="padding:6px 10px;">${a.status}</td></tr>`).join("");
  openPrintWindow("דוח "+names[month]+" "+year,`<div style="max-width:900px;margin:0 auto;"><div style="display:flex;justify-content:space-between;border-bottom:3px solid #1a5c3a;padding-bottom:14px;margin-bottom:20px;"><div style="font-size:20px;font-weight:700;color:#1a5c3a;">🦟 ${COMPANY.name}</div><div style="text-align:left;font-size:18px;font-weight:700;color:#1a5c3a;">דוח ${names[month]} ${year}</div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">${[["תורים",mAppts.length],["בוצעו",mAppts.filter(a=>a.status==="בוצע").length],["הכנסות","₪"+income.toLocaleString()],["רווח","₪"+(income-expense).toLocaleString()]].map(([l,v])=>`<div style="background:#f0f9f4;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:12px;color:#6b7280;">${l}</div><div style="font-size:20px;font-weight:700;color:#1a5c3a;">${v}</div></div>`).join("")}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;"><div><h3 style="color:#1a5c3a;margin-bottom:8px;">מדבירים</h3><table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e5e7eb;"><thead><tr style="background:#1a5c3a;color:#fff;"><th style="padding:7px;text-align:right;">מדביר</th><th style="padding:7px;">תורים</th><th style="padding:7px;">בוצעו</th><th style="padding:7px;">שווי</th></tr></thead><tbody>${wRows}</tbody></table></div><div><h3 style="color:#1a5c3a;margin-bottom:8px;">מזיקים</h3><table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e5e7eb;"><thead><tr style="background:#1a5c3a;color:#fff;"><th style="padding:7px;text-align:right;">מזיק</th><th style="padding:7px;">כמות</th></tr></thead><tbody>${pRows}</tbody></table></div></div><h3 style="color:#1a5c3a;margin-bottom:8px;">רשימת תורים</h3><table style="width:100%;border-collapse:collapse;font-size:12px;border:1px solid #e5e7eb;"><thead><tr style="background:#1a5c3a;color:#fff;"><th style="padding:7px;text-align:right;">תאריך</th><th style="padding:7px;text-align:right;">לקוח</th><th style="padding:7px;text-align:right;">מזיק</th><th style="padding:7px;text-align:right;">מדביר</th><th style="padding:7px;text-align:right;">מחיר</th><th style="padding:7px;text-align:right;">סטטוס</th></tr></thead><tbody>${aRows}</tbody></table></div>`);
}
function WeekCalendar({appointments,setAppointments,customers,setCustomers,workers,collabs=[],finance,setFinance,execLogs,setExecLogs,currentUser}){
  const [wk,setWk]=useState(0);
  const [showNew,setShowNew]=useState(false);
  const [prefill,setPrefill]=useState({});
  const [viewWk,setViewWk]=useState("all");
  const [calMode,setCalMode]=useState("week");
  const [dayDate,setDayDate]=useState(new Date());
  const [monthYear,setMonthYear]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const [invAppt,setInvAppt]=useState(null);
  const [detailAppt,setDetailAppt]=useState(null);
  const [logAppt,setLogAppt]=useState(null);
  const [draggedId,setDraggedId]=useState(null);
  const [dropTarget,setDropTarget]=useState(null);
  const [reminderAppt,setReminderAppt]=useState(null);
  const [dupAppt,setDupAppt]=useState(null);
  const [viewCustId,setViewCustId]=useState(null);
  const handleDuplicate=appt=>{
    const base={...appt,id:null,date:"",time:"09:00",timeWindow:"",status:"ממתין",executionLog:null};
    setDupAppt(base);
    setDetailAppt(null);
  };

  const moveAppt=(apptId,newDate,newTime,newWorkerId)=>{
    setAppointments(as=>as.map(a=>{
      if(a.id!==apptId) return a;
      const w=newWorkerId?workers.find(x=>x.id===newWorkerId):null;
      return {...a,date:newDate,time:newTime,...(w?{workerId:w.id,workerName:w.name}:{})};
    }));
  };

  const workerObj = workers.find(w=>w.id===currentUser.id) || {name:currentUser.name,license:"—"};
  const apptHasLog=id=>execLogs.some(l=>l.apptId===id);

  const saveLog=data=>{
    const aptWorker=workers.find(w=>w.id===logAppt?.workerId)||{};
    const id=nextId(execLogs);
    const newLog={id,docNum:`EL-${String(Date.now()).slice(-6)}`,apptId:logAppt?.id||null,customerId:logAppt?.customerId||null,date:data.date,clientName:data.clientName,address:data.address,structureType:data.structureType,pest:data.pest,pestLevel:data.pestLevel,materials:data.materials,extermination_notes:data.extermination_notes,warranty:data.warranty,notes:data.notes,workerId:aptWorker.id||logAppt?.workerId||null,workerName:aptWorker.name||workerObj.name,workerLicense:aptWorker.license||workerObj.license,safetyText:data.safety,paymentDone:data.paymentDone,paymentNote:data.paymentNote};
    setExecLogs(ls=>[newLog,...ls]);
    if(logAppt) setAppointments(as=>as.map(a=>a.id===logAppt.id?{...a,status:"בוצע",executionLog:newLog}:a));
    return newLog;
  };
  const saveInvoiceFromLog=inv=>{
    const id=nextId(finance);
    const saved={...inv,id};
    setFinance(fs=>[...fs,saved]);
    return saved;
  };

  const getWeek=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1+wk*7);return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});};
  const days=getWeek();
  const toISO=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const fmtD=d=>`${["א'","ב'","ג'","ד'","ה'","ו'","ש'"][d.getDay()===0?6:d.getDay()-1]} ${d.getDate()}/${d.getMonth()+1}`;
  const slots=["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];
  const wColor=wid=>{const w=workers.find(x=>x.id===wid);return w?.color||CLR.primary;};
  const sBg={"ממתין":"#fef9c3","בוצע":"#dcfce7","בדרך":"#dbeafe","בוטל":"#f3f4f6"};
  const filtered=appointments.filter(a=>{if(currentUser.role==="מדביר")return a.workerId===currentUser.id;if(viewWk!=="all")return a.workerId===parseInt(viewWk);return true;});
  const slotHour=t=>parseInt((t||"0").split(":")[0]);
  const atSlot=(iso,t)=>filtered.filter(a=>a.date===iso&&slotHour(a.time)===slotHour(t));
  const hasInvoice=id=>finance.some(f=>f.apptId===id);

  return <div>
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
      <Btn v="secondary" sm onClick={()=>setWk(w=>w-1)}>◀ שבוע קודם</Btn>
      <Btn v="secondary" sm onClick={()=>setWk(0)}>היום</Btn>
      <Btn v="secondary" sm onClick={()=>setWk(w=>w+1)}>שבוע הבא ▶</Btn>
      <span style={{flex:1,fontWeight:600,color:CLR.primary,fontSize:14}}>{fmtD(days[0])} – {fmtD(days[6])}</span>
      {currentUser.role!=="מדביר"&&<select value={viewWk} onChange={e=>setViewWk(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${CLR.border}`,fontSize:13}}>
        <option value="all">כל המדבירים</option>{workers.filter(w=>w.role==="מדביר").map(w=><option key={w.id} value={w.id}>{w.name}</option>)}</select>}
      <Btn sm v="secondary" onClick={()=>exportAppointments(appointments)}>📥 ייצא</Btn>
      <Btn sm v="ghost" onClick={()=>{
        if(calMode==="day") printDaySchedule(dayDate,appointments,workers);
        else if(calMode==="week") printDaySchedule(days[0],appointments,workers);
        else { const d=new Date(monthYear.y,monthYear.m,1); printDaySchedule(d,appointments,workers); }
      }}>🖨️ הדפס רשימה</Btn>
      <Btn sm onClick={()=>{setPrefill({});setShowNew(true);}}>+ תור חדש</Btn>
      <div style={{display:"flex",gap:2,background:"#e8f5ee",borderRadius:8,padding:3}}>
        {[["week","שבועי"],["day","יומי"],["month","חודשי"]].map(([m,l])=>(
          <button key={m} onClick={()=>setCalMode(m)} style={{padding:"5px 11px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:calMode===m?700:400,background:calMode===m?"#fff":"transparent",color:calMode===m?"#1a5c3a":"#6b7280"}}>{l}</button>
        ))}
      </div>
    </div>
    {/* Day view nav */}
    {calMode==="day"&&<div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
      <button onClick={()=>{const d=new Date(dayDate);d.setDate(d.getDate()-1);setDayDate(d);}} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:13}}>◀</button>
      <input type="date" value={`${dayDate.getFullYear()}-${String(dayDate.getMonth()+1).padStart(2,"0")}-${String(dayDate.getDate()).padStart(2,"0")}`}
        onChange={e=>{const d=new Date(e.target.value+"T12:00:00");if(!isNaN(d))setDayDate(d);}}
        style={{padding:"6px 10px",borderRadius:8,border:"1px solid #e5e7eb",fontSize:13}}/>
      <button onClick={()=>{const d=new Date(dayDate);d.setDate(d.getDate()+1);setDayDate(d);}} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:13}}>▶</button>
      <button onClick={()=>setDayDate(new Date())} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:12,color:"#6b7280"}}>היום</button>
    </div>}
    {/* Month view nav */}
    {calMode==="month"&&<div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
      <button onClick={()=>setMonthYear(mv=>{let m=mv.m-1,y=mv.y;if(m<0){m=11;y--;}return{y,m};})} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:13}}>◀</button>
      <button onClick={()=>{const n=new Date();setMonthYear({y:n.getFullYear(),m:n.getMonth()});}} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:12,color:"#6b7280"}}>החודש</button>

          <span style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:4,padding:"1px 6px",fontSize:11}}>🔴 עמוס</span>

      </span>}

    {/* Slot load map — for color coding */}
    {(()=>{ window._slotLoad={}; days.forEach(d=>{const iso=toISO(d);filtered.filter(a=>a.date===iso).forEach(a=>{const key=iso+"_"+slotHour(a.time);window._slotLoad[key]=(window._slotLoad[key]||0)+1;});}); return null; })()}

          {days.map((d,i)=>{const iso=toISO(d);const appts=atSlot(iso,slot);const isTdy=iso===todayStr();

                  <div onClick={e=>{e.stopPropagation();setReminderAppt(a);}} style={{fontSize:9,cursor:"pointer",padding:"1px 4px",borderRadius:4,background:"#dcfce7",color:"#166534"}}>💬</div>
                </div>
              </div>;})}
            </td>);})}
        </tr>)}</tbody>
      </table>
    </div>}
    {showNew&&<Modal title={"📝 הזמנת עבודה חדשה — "+(prefill.date?fmtDate(prefill.date):"")+" "+(prefill.time||"")} onClose={()=>setShowNew(false)} width={860}>
      <div style={{fontSize:12,color:CLR.muted,marginBottom:12,background:CLR.primaryLight,borderRadius:8,padding:"8px 12px"}}>
        📅 נפתח מהיומן — התאריך והשעה מולאו מראש. השלם את שאר הפרטים ושגר.
      </div>
      <OrderForm workers={workers} showGuidance={false}
        initialDate={prefill.date} initialTime={prefill.time} initialWorker={prefill.workerId}
        onSave={c=>{const saved={...c,id:nextId(customers)};setCustomers(cs=>[...cs,saved]);return saved;}}
        onSchedule={appt=>setAppointments(as=>[...as,{...appt,id:nextId(as)}])}
        onDone={(saved,schedInfo)=>{
          if(schedInfo) alert(`✅ הזמנה נשמרה וקבוצה ל-${schedInfo.workerName} ב-${fmtDate(schedInfo.date)}`);
          else if(saved) alert(`✅ נשמר תיק הדברה: ${saved.name}`);
          setShowNew(false);
        }}
        onCancel={()=>setShowNew(false)}/>
    </Modal>}
    {invAppt&&<InvoiceModal appt={invAppt} customers={customers} onClose={()=>setInvAppt(null)} onSave={rec=>{setFinance(fs=>[...fs,{...rec,id:nextId(fs)}]);setInvAppt(null);}}/>}
    {detailAppt&&<ApptDetailModal appt={detailAppt} customers={customers} workers={workers} currentUser={currentUser}
      execLogs={execLogs} finance={finance}
      hasInvoice={hasInvoice(detailAppt.id)} hasLog={apptHasLog(detailAppt.id)}
      onClose={()=>setDetailAppt(null)}
      onFillLog={a=>{setLogAppt(a);}}
      onInvoice={a=>{setDetailAppt(null);setInvAppt(a);}}
      onMarkPaid={inv=>{setFinance(fs=>fs.map(f=>f.id===inv.id?{...f,status:"שולם"}:f));setDetailAppt(null);}}
      onReminder={a=>{setReminderAppt(a);setDetailAppt(null);}}
      onDuplicate={handleDuplicate}
      onSaveEdit={updated=>{setAppointments(as=>as.map(a=>a.id===updated.id?updated:a));setDetailAppt(updated);}}
      onMarkEnRoute={a=>{setAppointments(as=>as.map(x=>x.id===a.id?{...x,status:"בדרך"}:x));setDetailAppt({...a,status:"בדרך"});}}
      onViewCustomer={id=>{setViewCustId(id);}}/>}
    {reminderAppt&&<WAReminderModal appt={reminderAppt} customers={customers} onClose={()=>setReminderAppt(null)}/>}
    {viewCustId&&(()=>{
      const vc=customers.find(c=>c.id===viewCustId)||null; if(!vc) return null;
      const vcAppts=appointments.filter(a=>a.customerId===viewCustId);
      return <Modal title={"🗂️ "+vc.name} onClose={()=>setViewCustId(null)} width={520}>
        <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}><Badge status={vc.status}/><span style={{fontSize:13,color:CLR.muted}}>{vc.phone}</span></div>
        <G2 gap={8}>{[["📍 כתובת",vc.address||"—"],["🏠 נכס",vc.propertyType||"—"],["🐛 מזיק",vc.pestType||"—"],["💰 שולם","₪"+(vc.totalPaid||0)]].map(([l,v])=>(
          <div key={l} style={{background:CLR.surface,borderRadius:8,padding:"8px 12px",fontSize:13}}><div style={{fontSize:11,color:CLR.muted,marginBottom:2}}>{l}</div><div style={{fontWeight:500}}>{v}</div></div>
        ))}</G2>
        {vc.notes&&<div style={{background:"#fef9c3",borderRadius:8,padding:"10px 14px",margin:"10px 0",fontSize:13}}>⚠️ {vc.notes}</div>}
        <div style={{fontWeight:600,fontSize:13,color:CLR.primary,margin:"12px 0 8px"}}>טיפולים ({vcAppts.length})</div>
        <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:5}}>
          {vcAppts.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>(
            <div key={a.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:CLR.surface,borderRadius:6,fontSize:12}}>
              <span><b>{fmtDate(a.date)}</b>{" "}{a.pestType}{" · "}{a.workerName}</span>
              <span style={{fontWeight:600}}>{"₪"+a.price}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:12}}><Btn full v="ghost" onClick={()=>setViewCustId(null)}>סגור</Btn></div>
      </Modal>;
    })()}
    {dupAppt&&<NewApptModal customers={customers} workers={workers} collabs={collabs} prefill={dupAppt}
      onClose={()=>setDupAppt(null)}
      onSave={a=>{setAppointments(as=>[...as,{...a,id:nextId(as)}]);setDupAppt(null);alert("✅ תור שוכפל!");}}/> }
    {logAppt&&<ExecLogModalInline appt={logAppt} worker={workers.find(w=>w.id===logAppt.workerId)||workerObj}
      currentUser={currentUser}
      onClose={()=>{setLogAppt(null);setDetailAppt(null);}} onSave={saveLog} onSaveInvoice={saveInvoiceFromLog}/>}
  </div>;
}

function PestMultiPicker({selected,onChange,customPest,setCustomPest}){
  const toggle=p=>selected.includes(p)?onChange(selected.filter(x=>x!==p)):onChange([...selected,p]);
  return <div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
      {PEST_TYPES_CRM.map(p=>{
        const on=selected.includes(p);
        return <button key={p} type="button" onClick={()=>toggle(p)}
          style={{background:on?CLR.primary:CLR.surface,color:on?"#fff":CLR.muted,border:`1px solid ${on?CLR.primary:CLR.border}`,borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer",fontWeight:on?600:400}}>
          {on?"✓ ":""}{p}

}
